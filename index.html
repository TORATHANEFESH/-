<style>
*{box-sizing:border-box;}
html{font-size:110%;}
body{font-family:'Assistant',sans-serif;}
h1,h2,h3,h4,h5,h6{font-family:'Heebo','Assistant',sans-serif;font-weight:800;}
input,textarea,select,button{font-family:'Assistant',sans-serif;}
body{margin:0;min-height:100vh;}

/* ── THEMES ── */
body.theme-default{
  --bg:#F9FCFF;--card:#fff;--hdr:#fff;--a1:#1E244B;--a2:#524686;
  --txt:#1E244B;--sub:#54595F;--nf:#1E244B;--nt:#524686;
  --trk:#ede8f3;--brd:rgba(30,36,75,.08);--hf:#1E244B;--ht:#524686;
  --orange:#E88F6A;--salmon:#C4896E;--mauve:#A87071;--plum:#765C74;--purple:#524686;--lavender:#8A81AF;--navy:#1E244B;
}
body.theme-logo{
  --bg:#F7F7F7;--card:#fff;--hdr:#fff;--a1:#765C74;--a2:#524686;
  --txt:#1E244B;--sub:#54595F;--nf:#765C74;--nt:#524686;
  --trk:#ede8f3;--brd:rgba(118,92,116,.1);--hf:#765C74;--ht:#524686;
  --orange:#E88F6A;--salmon:#C4896E;--mauve:#A87071;--plum:#765C74;--purple:#524686;--lavender:#8A81AF;--navy:#1E244B;
}
body.theme-screenshot{
  --bg:#f4f6fa;--card:#fff;--hdr:#fff;--a1:#A87071;--a2:#1E244B;
  --txt:#1E244B;--sub:#54595F;--nf:#A87071;--nt:#1E244B;
  --trk:#e2e8f0;--brd:rgba(0,0,0,.07);--hf:#A87071;--ht:#1E244B;
  --orange:#E88F6A;--salmon:#C4896E;--mauve:#A87071;--plum:#765C74;--purple:#524686;--lavender:#8A81AF;--navy:#1E244B;
}
body.theme-animated{
  --bg:#0f0c29;--card:rgba(255,255,255,.07);--hdr:rgba(15,12,41,.96);
  --a1:#a855f7;--a2:#06b6d4;--txt:#eeeeff;--sub:#a0a0c0;
  --nf:#a855f7;--nt:#06b6d4;--trk:rgba(255,255,255,.1);
  --brd:rgba(255,255,255,.12);--hf:#6d28d9;--ht:#0891b2;
}
body.theme-animated::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse at 20% 50%,rgba(168,85,247,.2) 0%,transparent 50%),
             radial-gradient(ellipse at 80% 20%,rgba(6,182,212,.2) 0%,transparent 50%),
             radial-gradient(ellipse at 50% 80%,rgba(99,102,241,.12) 0%,transparent 50%);
  animation:bgPulse 6s ease-in-out infinite alternate;
}
@keyframes bgPulse{0%{opacity:.7}100%{opacity:1}}
body.theme-animated .logo-img{mix-blend-mode:lighten;filter:brightness(1.4) drop-shadow(0 0 8px rgba(168,85,247,.4));}

/* ── APP ── */
html{width:100%;min-width:320px;}
body{width:100%;min-width:320px;margin:0;padding:0;}
#root{width:100%;min-width:320px;}
.app-bg{background:var(--bg);min-height:100vh;position:relative;z-index:1;width:100%;}
.app-hdr{
  background:var(--hdr);
  border-bottom:1px solid var(--brd);
  box-shadow:0 2px 16px rgba(0,0,0,.06);
  position:sticky;top:0;z-index:50;
  backdrop-filter:blur(12px);
}
.card{
  background:var(--card);border-radius:14px;
  box-shadow:0 1px 8px rgba(0,0,0,.05);
  border:1px solid var(--brd);transition:box-shadow .2s,transform .2s;
}
body.theme-animated .card{backdrop-filter:blur(10px);}
.card:hover{box-shadow:0 4px 16px rgba(0,0,0,.09);}

.btn-p{
  background:linear-gradient(135deg,#E88F6A,#A87071,#765C74,#524686);
  color:#fff;border:none;cursor:pointer;transition:opacity .15s,box-shadow .15s;
}
.btn-p:hover{opacity:.92;box-shadow:0 3px 12px rgba(82,70,134,.4);}

.nav-tab{
  padding:8px 16px;border-radius:9px;font-weight:600;
  font-size:.85rem;white-space:nowrap;cursor:pointer;
  transition:background .15s,color .15s;border:1px solid transparent;
}

.stat-card{
  background:var(--card);border-radius:12px;padding:16px;
  cursor:pointer;transition:box-shadow .2s;
  border:1px solid var(--brd);
}
.stat-card:hover{box-shadow:0 6px 18px rgba(0,0,0,.09);}
body.theme-animated .stat-card:hover{box-shadow:0 6px 18px rgba(168,85,247,.18);}

.fl-label{display:block;font-size:.8rem;font-weight:700;color:var(--txt);margin-bottom:5px;}
.fl-label.req::after{content:' *';color:#ef4444;}
input,textarea,select{
  width:100%;
  padding:11px 14px;border:2px solid var(--brd);
  border-radius:11px;background:var(--card);color:var(--txt);
  font-size:.9rem;transition:border-color .2s;
}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--a1);box-shadow:0 0 0 3px rgba(30,36,75,.12);}

/* Login background animation */
@keyframes floatA{0%{transform:translateY(0)translateX(0)}33%{transform:translateY(-50px)translateX(-20px)}66%{transform:translateY(-15px)translateX(30px)}100%{transform:translateY(0)translateX(0)}}
@keyframes fadeSlideUp{0%{opacity:0;transform:translateY(18px)}100%{opacity:1;transform:translateY(0)}}
@keyframes dotsFloat{0%{background-position:0 0;opacity:0.18}50%{opacity:0.28}100%{background-position:40px 40px;opacity:0.18}}
.teacher-welcome{animation:fadeSlideUp .4s ease both;}

::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-thumb{background:rgba(30,36,75,.25);border-radius:999px;}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .app-hdr .hdr-inner{padding:8px 16px!important;}
  .logo-img{height:70px!important;}
  .main-content{padding:14px 16px!important;}
  .stat-grid{grid-template-columns:1fr 1fr!important;}
  .req-grid{grid-template-columns:1fr 1fr!important;}
  .footer-grid{grid-template-columns:1fr!important;}
}
@media(max-width:480px){
  .stat-grid{grid-template-columns:1fr!important;}
}
</style>

function dataURLtoBlob(dataURL){
  const parts=dataURL.split(',');const mime=parts[0].match(/:(.*?);/)[1];
  const b64=atob(parts[1]);const arr=new Uint8Array(b64.length);
  for(let i=0;i<b64.length;i++)arr[i]=b64.charCodeAt(i);
  return new Blob([arr],{type:mime});
}

}
async function openFileUrl(url,name){
  if(url&&url.startsWith('#fsfile:')){
    const fileId=url.substring(8);
    try{
      const doc=await db.collection('fileStore').doc(fileId).get();
      if(!doc.exists){alert('הקובץ לא נמצא');return;}
      const meta=doc.data();let base64='';
      for(let i=0;i<meta.chunkCount;i++){
        const chunk=await db.collection('fileStore').doc(fileId).collection('chunks').doc(String(i)).get();
        if(chunk.exists)base64+=chunk.data().data;
      }
      const blob=dataURLtoBlob(base64);
      const blobUrl=URL.createObjectURL(blob);
      showFilePreview(blobUrl,meta.name||name||'');
    }catch(e){alert('שגיאה בפתיחת הקובץ: '+e.message);}
  }else{
    const driveId=getDriveFileId(url);
    if(driveId){showDrivePreview(driveId,name||url);return;}
    showFilePreview(url,name||'');
  }
}
function getDriveFileId(url){
  if(!url)return null;
  const m=url.match(/\/d\/([a-zA-Z0-9_-]+)/)||url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
  return m?m[1]:null;
}
function showDrivePreview(fileId,name){
  const old=document.getElementById('file-preview-overlay');if(old)old.remove();

  ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;';
  ov.onclick=e=>{if(e.target===ov)ov.remove();};
  const close=document.createElement('button');
  close.innerHTML='✕';close.style.cssText='position:fixed;top:18px;right:24px;background:rgba(255,255,255,.95);border:none;width:40px;height:40px;border-radius:50%;font-size:1.3rem;cursor:pointer;z-index:10001;box-shadow:0 2px 8px rgba(0,0,0,.2);';
  close.onclick=()=>ov.remove();ov.appendChild(close);
  const ifr=document.createElement('iframe');
  ifr.src='https://drive.google.com/file/d/'+fileId+'/preview';
  ifr.style.cssText='width:90vw;height:90vh;border:none;border-radius:12px;background:white;';

}
function upFileToFirestore(file,uid,cat,onProgress){
  const MAX_CHUNK=700000;
  return new Promise((resolve,reject)=>{
    if(file.size>10*1024*1024){reject(new Error('הקובץ גדול מדי — מקסימום 10MB'));return;}
    const reader=new FileReader();
    reader.onload=async()=>{
      try{
        const base64=reader.result;const chunks=[];
        for(let i=0;i<base64.length;i+=MAX_CHUNK)chunks.push(base64.substring(i,i+MAX_CHUNK));
        if(onProgress)onProgress(10);
        const docRef=await db.collection('fileStore').add({
          name:file.name,uid,cat,size:file.size,type:file.type,
          chunkCount:chunks.length,createdAt:new Date().toISOString()
        });
        for(let i=0;i<chunks.length;i++){
          await db.collection('fileStore').doc(docRef.id).collection('chunks').doc(String(i)).set({data:chunks[i]});
          if(onProgress)onProgress(10+Math.round(((i+1)/chunks.length)*85));
        }
        if(onProgress)onProgress(100);
        const result={url:`#fsfile:${docRef.id}`,name:file.name,at:new Date().toISOString(),uid,cat};
        try{await db.collection('uploads').add({studentId:uid,category:cat,fileName:file.name,url:result.url,uploadedAt:new Date().toISOString(),seen:false});}catch(e){}
        resolve(result);
      }catch(e){reject(new Error('שגיאה בשמירת הקובץ: '+e.message));}
    };
    reader.onerror=()=>reject(new Error('שגיאה בקריאת הקובץ'));
    reader.readAsDataURL(file);
  });
}
function upFile(file,uid,cat,onProgress){
  return upFileToFirestore(file,uid,cat,onProgress);
}

function getYouTubeId(url){
  if(!url)return null;
  const m=url.match(/(?:youtu\.be\/|youtube\.com\/(?:embed\/|v\/|watch\?v=|shorts\/))([^?&/#]+)/);
  return m?m[1]:null;
}

// ══════════ APP ROOT ══════════
function App(){
  const [users,setUsers]=useState([]);
  const [cur,setCur]=useState(()=>{
    try{const s=localStorage.getItem('cur_user');return s?JSON.parse(s):null;}
    catch(e){return null;}
  });
  const [view,setView]=useState('dashboard');
  const [updates,setUpdates]=useState([]);
  const [adminPw,setAdminPw]=useState('1234');
  const [teacherPw,setTeacherPw]=useState('1234');
  const [isAdmin,setIsAdmin]=useState(false);
  const [isTeacher,setIsTeacher]=useState(false);
  const [teacherGender,setTeacherGender]=useState(null);
  const logoClicksRef=useRef([]);
  const [siteC,setSiteC]=useState({});
  const [reqOv,setReqOv]=useState({});
  const [theme,setTheme]=useState('default');

  useEffect(()=>{
    db.collection('settings').doc('general').get().then(d=>{
      if(d.exists){
        const v=d.data();
        if(v.adminPassword) setAdminPw(v.adminPassword);
        if(v.teacherPassword) setTeacherPw(v.teacherPassword);
        if(v.theme){setTheme(v.theme);document.body.className='theme-'+v.theme;}
      }
    }).catch(console.error);
    db.collection('settings').doc('siteContent').get().then(d=>{
      if(d.exists){
        const cont=d.data().content||{};
        setSiteC(cont);setReqOv(d.data().reqOv||{});
        if(cont.bodyFont) document.body.style.fontFamily=`'${cont.bodyFont}',sans-serif`;
        if(cont.headingFont){
          const applyHF=()=>document.querySelectorAll('h1,h2,h3,h4').forEach(el=>el.style.fontFamily=`'${cont.headingFont}',sans-serif`);
          applyHF();setTimeout(applyHF,500);
        }
      }
    }).catch(console.error);
    db.collection('users').get().then(s=>{
      const a=[];s.forEach(d=>a.push({id:d.id,...d.data()}));setUsers(a);
    }).catch(console.error);
    db.collection('updates').orderBy('createdAt','desc').get().then(s=>{
      const a=[];s.forEach(d=>a.push({id:d.id,...d.data()}));setUpdates(a);
    }).catch(console.error);
  },[]);

  useEffect(()=>{document.body.className='theme-'+theme;},[theme]);
  useEffect(()=>{
    try{
      if(cur) localStorage.setItem('cur_user',JSON.stringify(cur));
      else localStorage.removeItem('cur_user');
    }catch(e){}
  },[cur]);
  useEffect(()=>{
    if(users.length>0) users.forEach(u=>db.collection('users').doc(u.id).set(u).catch(console.error));
  },[users]);

  const updateUser=upd=>{
    const a=users.map(u=>u.id===cur.id?{...u,...upd}:u);
    setUsers(a);setCur({...cur,...upd});
  };

  const handleLogo=()=>{
    const now=Date.now();
    const recent=logoClicksRef.current.filter(t=>now-t<1200);
    if(recent.length>=2){
      // Triple click — admin/teacher
      logoClicksRef.current=[];
      const choice=prompt('בחר תפקיד:\n1 — מנהל\n2 — מחנך\n\nהזן מספר:');
      if(choice==='1'){
        const pw=prompt('סיסמת מנהל:');
        if(pw===adminPw){setIsAdmin(true);setView('admin');}
        else if(pw) alert('סיסמה שגויה');
      } else if(choice==='2'){
        const pw=prompt('סיסמת מחנך:');
        if(pw===teacherPw){
          const g=prompt('בחר מגדר:\n1 — גברים\n2 — נשים');
          if(g==='1'||g==='2'){
            setTeacherGender(g==='1'?'male':'female');
            setIsTeacher(true);setView('teacher');
          } else if(g) alert('בחירה לא תקינה');
        }
        else if(pw) alert('סיסמה שגויה');
      }
    } else {
      logoClicksRef.current=[...recent,now];
      // Single click — go to dashboard
      if(recent.length===0 && cur && !isAdmin && !isTeacher){
        setTimeout(()=>{
          if(logoClicksRef.current.filter(t=>Date.now()-t<1200).length<=1){
            setView('dashboard');
          }
        },400);
      }
    }
  };

  if(isAdmin&&view==='admin')
    return <AdminPanel users={users} setUsers={setUsers}
      adminPw={adminPw} setAdminPw={setAdminPw}
      teacherPw={teacherPw} setTeacherPw={setTeacherPw}
      setIsAdmin={setIsAdmin} setView={setView}
      updates={updates} setUpdates={setUpdates}/>;

  if(isTeacher&&view==='teacher')
    return <TeacherPanel users={users} setIsTeacher={setIsTeacher} setView={setView} lockedGender={teacherGender} setTeacherGender={setTeacherGender}/>;

  if(!cur)
    return <LoginPage users={users} setUsers={setUsers} setCur={setCur} onLogo={handleLogo}/>;

  return <MainApp user={cur} updateUser={updateUser} view={view} setView={setView}
    onLogout={()=>{setCur(null);setView('login');setIsAdmin(false);setIsTeacher(false);setTeacherGender(null);try{localStorage.removeItem('cur_user');}catch(e){}}}
    onLogo={handleLogo} reqOv={reqOv} siteC={siteC}
    updates={updates} setUpdates={setUpdates}/>;
}

// ══════════ ADMIN STUDENT DETAIL ══════════
function AdminStudentDetail({uid,users,setUsers,onClose}){
  const u=users.find(x=>x.id===uid);
  if(!u)return null;
  const [tab,setTab]=useState('practical');
  const isFem=u.gender==='female';
  const yr=parseInt(u.year);
  const upd=changes=>{const nxt=users.map(x=>x.id===uid?{...x,...changes}:x);setUsers(nxt);db.collection('users').doc(uid).update(changes).catch(console.error);};
  const delItem=(field,i)=>{if(!confirm('למחוק?'))return;const a=[...(u[field]||[])];a.splice(i,1);upd({[field]:a});};
  const practFlds=[['open','כיצד התחילה הפגישה'],['topics','נושאים שעלו'],['position','עמדת הנועץ/ת'],['focus','נקודות מיקוד'],['insights','תובנות'],['challenge','קושי מרכזי'],['lessons','לקחים']];
  const supFlds=[['topics','נושאים שנדונו'],['feedback','משוב מהמדריך/ה'],['contribution','תרומה'],['challenges','אתגרים'],['selfLearn','מה למדתי על עצמי'],['goals','יעדים לפגישה הבאה'],['lessons','לקחים']];
  const tabs=[
    {id:'practical',l:`התנסות (${(u.practical||[]).length})`},
    {id:'supervision',l:`הדרכות (${(u.supervision||[]).length})`},
    {id:'cases',l:`הצגות מקרה (${(u.cases||[]).length})`},
    {id:'proficiency',l:`בקיאות (${(u.proficiency||[]).length})`},
    {id:'final',l:'עבודה מסכמת'},
  ];
  const DelBtn=({onClick})=>(<button onClick={onClick} style={{padding:'3px 9px',borderRadius:'6px',background:'rgba(239,68,68,.1)',color:'#ef4444',fontWeight:700,border:'1px solid rgba(239,68,68,.2)',cursor:'pointer',fontSize:'.75rem',flexShrink:0}}>מחק</button>);
  const FB=({label,value})=>value?(<div style={{marginBottom:'6px'}}><p style={{margin:'0 0 1px',fontSize:'.7rem',fontWeight:700,color:'#9ca3af'}}>{label}</p><p style={{margin:0,fontSize:'.84rem',color:'#374151',whiteSpace:'pre-line'}}>{value}</p></div>):null;
  const Empty=({t})=>(<p style={{color:'#9ca3af',textAlign:'center',padding:'24px 0',fontSize:'.87rem'}}>{t||'אין נתונים'}</p>);
  return(
    <div style={{background:'white',borderRadius:'14px',padding:'20px',boxShadow:'0 2px 10px rgba(0,0,0,.06)'}}>
      <div style={{display:'flex',alignItems:'center',gap:'12px',marginBottom:'16px'}}>
        <button onClick={onClose} style={{padding:'6px 14px',borderRadius:'8px',background:'#f3f4f6',color:'#374151',fontWeight:700,border:'none',cursor:'pointer',fontSize:'.83rem'}}>← חזור לרשימה</button>
        <div>
          <h2 style={{margin:0,fontSize:'1rem',fontWeight:800,color:'#1e2a3a'}}>{u.name}</h2>
          <p style={{margin:0,fontSize:'.78rem',color:'#6b7280'}}>{u.email} · {YL[u.year]||u.year} · {u.gender==='female'?'אשה':'איש'}</p>
        </div>
      </div>
      <div style={{display:'flex',gap:'4px',flexWrap:'wrap',marginBottom:'14px',borderBottom:'2px solid #f3f4f6',paddingBottom:'10px'}}>
        {tabs.map(t=>(<button key={t.id} onClick={()=>setTab(t.id)} style={{padding:'5px 12px',borderRadius:'7px',fontWeight:600,border:'none',cursor:'pointer',fontSize:'.78rem',background:tab===t.id?'#1E244B':'#f3f4f6',color:tab===t.id?'white':'#6b7280'}}>{t.l}</button>))}
      </div>
      <div style={{maxHeight:'60vh',overflowY:'auto'}}>
        {tab==='practical'&&(!(u.practical||[]).length?<Empty/>:(u.practical||[]).map((r,i)=>(
          <div key={r.id||i} style={{borderRadius:'10px',border:'1px solid #e5e7eb',marginBottom:'10px',overflow:'hidden'}}>
            <div style={{background:'#eff6ff',padding:'9px 13px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div><span style={{fontWeight:700,fontSize:'.87rem',color:'#1e40af'}}>מפגש #{r.num}</span><span style={{marginRight:'8px',fontSize:'.78rem',color:'#6b7280'}}>{r.date?new Date(r.date).toLocaleDateString('he-IL'):''}</span></div>
              <DelBtn onClick={()=>delItem('practical',i)}/>
            </div>
            <div style={{padding:'12px'}}>{practFlds.map(([k,l])=><FB key={k} label={l} value={r[k]}/>)}{(r.atts||[r.att]).filter(Boolean).map((att,ai)=><a key={ai} href="#" onClick={e=>{e.preventDefault();openFileUrl(att.url,att.name);}} style={{display:'block',color:'#059669',fontSize:'.81rem',fontWeight:600,textDecoration:'none',cursor:'pointer',marginTop:'4px'}}>📄 {att.name}</a>)}</div>
          </div>
        )))}
        {tab==='supervision'&&(!(u.supervision||[]).length?<Empty/>:(u.supervision||[]).map((r,i)=>(
          <div key={r.id||i} style={{borderRadius:'10px',border:'1px solid #e5e7eb',marginBottom:'10px',overflow:'hidden'}}>
            <div style={{background:'#f0fdf4',padding:'9px 13px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div><span style={{fontWeight:700,fontSize:'.87rem',color:'#166534'}}>הדרכה #{i+1}{r.inst?` — ${r.inst}`:''}</span><span style={{marginRight:'8px',fontSize:'.78rem',color:'#6b7280'}}>{r.date?new Date(r.date).toLocaleDateString('he-IL'):''}</span></div>
              <DelBtn onClick={()=>delItem('supervision',i)}/>
            </div>
            <div style={{padding:'12px'}}>{supFlds.map(([k,l])=><FB key={k} label={l} value={r[k]}/>)}</div>
          </div>
        )))}
        {tab==='cases'&&(!(u.cases||[]).length?<Empty/>:(u.cases||[]).map((c,i)=>(
          <div key={c.id||i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'11px 14px',borderRadius:'9px',background:'rgba(139,92,246,.05)',border:'1px solid rgba(139,92,246,.15)',marginBottom:'7px'}}>
            <div><p style={{margin:'0 0 2px',fontWeight:600,fontSize:'.87rem',color:'#374151'}}>{c.name}</p><p style={{margin:0,fontSize:'.73rem',color:'#9ca3af'}}>{c.at?new Date(c.at).toLocaleDateString('he-IL'):''}</p></div>
            <div style={{display:'flex',gap:'6px'}}><a href="#" onClick={e=>{e.preventDefault();openFileUrl(c.url,c.name);}} style={{padding:'4px 10px',borderRadius:'7px',background:'#524686',color:'white',fontSize:'.78rem',fontWeight:600,textDecoration:'none',cursor:'pointer'}}>פתח</a><DelBtn onClick={()=>delItem('cases',i)}/></div>
          </div>
        )))}
        {tab==='proficiency'&&(!(u.proficiency||[]).length?<Empty/>:(u.proficiency||[]).map((t,i)=>(
          <div key={t.id||i} style={{padding:'11px 14px',borderRadius:'9px',border:'1px solid #fde68a',background:'#fffbeb',marginBottom:'7px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div><p style={{margin:'0 0 2px',fontWeight:700,fontSize:'.87rem',color:'#374151'}}>מבחן #{i+1} — {t.topic}</p><p style={{margin:0,fontSize:'.75rem',color:'#9ca3af'}}>{t.date?new Date(t.date).toLocaleDateString('he-IL'):''}{t.grade?` | ציון: ${t.grade}`:''}</p></div>
            <DelBtn onClick={()=>delItem('proficiency',i)}/>
          </div>
        )))}
        {tab==='final'&&(!u.finalProject?<Empty t="לא הועלתה עבודה מסכמת"/>:
          <div style={{padding:'14px',borderRadius:'11px',background:'rgba(16,185,129,.07)',border:'1px solid rgba(16,185,129,.2)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div><p style={{margin:'0 0 2px',fontWeight:700,color:'#059669',fontSize:'.9rem'}}>{u.finalProject.name}</p><p style={{margin:0,fontSize:'.75rem',color:'#9ca3af'}}>{u.finalProject.at?new Date(u.finalProject.at).toLocaleDateString('he-IL'):''}</p></div>
            <div style={{display:'flex',gap:'6px'}}><a href="#" onClick={e=>{e.preventDefault();openFileUrl(u.finalProject.url,u.finalProject.name);}} style={{padding:'5px 12px',borderRadius:'7px',background:'#059669',color:'white',fontSize:'.79rem',fontWeight:600,textDecoration:'none',cursor:'pointer'}}>פתח</a><DelBtn onClick={()=>{if(confirm('למחוק עבודה מסכמת?'))upd({finalProject:null});}}/></div>
          </div>
        )}
      </div>
    </div>
  );
}

// ══════════ ADMIN PANEL ══════════
function AdminPanel({users,setUsers,adminPw,setAdminPw,teacherPw,setTeacherPw,setIsAdmin,setView,updates,setUpdates}){
  const [tab,setTab]=useState('students');
  const [selStu,setSelStu]=useState(null);
  const [gf,setGf]=useState('');
  const [yf,setYf]=useState('');
  const [editAdminPw,setEditAdminPw]=useState(adminPw);
  const [editTeacherPw,setEditTeacherPw]=useState(teacherPw);
  const [saving,setSaving]=useState(false);
  const [saved,setSaved]=useState(false);
  const [dirty,setDirty]=useState(false);
  const [upForm,setUpForm]=useState({title:'',body:'',url:'',author:'הנהלה'});
  const [addingUp,setAddingUp]=useState(false);
  const [savingUp,setSavingUp]=useState(false);
  const [editingUp,setEditingUp]=useState(null);
  const addUpdate=async()=>{
    if(!upForm.title.trim()){alert('נא להזין כותרת');return;}
    setSavingUp(true);
    try{
      const data={...upForm,createdAt:new Date().toISOString()};
      const ref=await db.collection('updates').add(data);
      setUpdates(prev=>[{id:ref.id,...data},...prev]);
      setUpForm({title:'',body:'',url:'',author:'הנהלה'});
      setAddingUp(false);
      alert('העדכון פורסם!');
    }catch(e){alert('שגיאה: '+e.message);}
    setSavingUp(false);
  };
  const delUpdate=async id=>{
    if(!confirm('למחוק עדכון זה?'))return;
    try{await db.collection('updates').doc(id).delete();setUpdates(prev=>prev.filter(u=>u.id!==id));}
    catch(e){alert('שגיאה: '+e.message);}
  };
  const saveEditUpdate=async()=>{
    if(!editingUp||!editingUp.title.trim()){alert('נא להזין כותרת');return;}
    setSavingUp(true);
    try{
      const {id,...data}=editingUp;
      await db.collection('updates').doc(id).update(data);
      setUpdates(prev=>prev.map(u=>u.id===id?{...u,...data}:u));
      setEditingUp(null);
    }catch(e){alert('שגיאה: '+e.message);}
    setSavingUp(false);
  };

  useEffect(()=>{
    db.collection('users').get().then(s=>{
      const a=[];s.forEach(d=>a.push({id:d.id,...d.data()}));
      if(a.length>0) setUsers(a);
    }).catch(console.error);
  },[]);

  const upYear=(uid,yr)=>{
    const u=users.find(x=>x.id===uid);if(!u)return;
    const snap={year:u.year,at:new Date().toISOString()};
    const hist=[...(u.yearHistory||[])];if(!hist.find(h=>h.year===u.year))hist.push(snap);
    const upd=users.map(x=>x.id===uid?{...x,year:yr,yearHistory:hist}:x);setUsers(upd);
    db.collection('users').doc(uid).update({year:yr,yearHistory:hist}).catch(console.error);
    alert(`שנה עודכנה ל-${YL[yr]||yr}`);
  };

  const allFiles=users.flatMap(u=>[
    ...(u.cases||[]).map(c=>({uid:u.id,uname:u.name,cat:'הצגת מקרה',...c})),
    u.finalProject?{uid:u.id,uname:u.name,cat:'עבודה מסכמת',...u.finalProject}:null,
    ...(u.practical||[]).flatMap(p=>(p.atts||[p.att]).filter(Boolean).map(att=>({uid:u.id,uname:u.name,cat:'קובץ דיווח',...att})))
  ]).filter(Boolean);

  const saveSettings=async()=>{
    setSaving(true);
    try{
      const genData={};
      if(editAdminPw!==adminPw){genData.adminPassword=editAdminPw;setAdminPw(editAdminPw);}
      if(editTeacherPw!==teacherPw){genData.teacherPassword=editTeacherPw;setTeacherPw(editTeacherPw);}
      if(Object.keys(genData).length>0)
        await db.collection('settings').doc('general').set(genData,{merge:true});
      setSaved(true);setDirty(false);setTimeout(()=>setSaved(false),3000);
    }catch(e){alert('שגיאה בשמירה: '+e.message);}
    setSaving(false);
  };

  return(
    <div style={{minHeight:'100vh',background:'#f7f5fb'}}>
      <header style={{background:'linear-gradient(135deg,#1E244B,#524686)',padding:'13px 28px',boxShadow:'0 2px 12px rgba(0,0,0,.2)'}}>
        <div style={{maxWidth:'1200px',margin:'0 auto',display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:'9px'}}>
          <div style={{color:'white'}}>
            <h1 style={{margin:0,fontSize:'1.1rem',fontWeight:800}}>פאנל ניהול</h1>
            <p style={{margin:0,fontSize:'.75rem',opacity:.8}}>מכללת תורת הנפש</p>
          </div>
          <div style={{display:'flex',gap:'8px',alignItems:'center'}}>
            {tab==='settings'&&<button onClick={saveSettings} disabled={saving} style={{padding:'7px 16px',borderRadius:'9px',background:saved?'#10b981':dirty?'#f59e0b':'rgba(255,255,255,.18)',color:'white',fontWeight:700,border:'none',cursor:'pointer',fontSize:'.84rem'}}>{saving?'שומר...':saved?'נשמר ✓':dirty?'שמור ●':'שמור'}</button>}
            <button onClick={()=>{setIsAdmin(false);setView('dashboard');}} style={{padding:'7px 15px',borderRadius:'9px',background:'white',color:'#0F3F76',fontWeight:700,border:'none',cursor:'pointer',fontSize:'.84rem'}}>יציאה</button>
          </div>
        </div>
      </header>

      <div style={{maxWidth:'1200px',margin:'0 auto',padding:'18px 24px'}}>
        <div style={{display:'flex',gap:'6px',marginBottom:'18px',flexWrap:'wrap'}}>
          {[['students','תלמידים'],['files','קבצים'],['updates','עדכונים'],['settings','הגדרות']].map(([k,l])=>(
            <button key={k} onClick={()=>setTab(k)} style={{padding:'8px 18px',borderRadius:'9px',fontWeight:700,fontSize:'.84rem',cursor:'pointer',border:'none',background:tab===k?'#1E244B':'#e8e0f0',color:tab===k?'white':'#0F3F76',transition:'all .15s'}}>{l}</button>
          ))}
        </div>

        {tab==='students'&&selStu&&(
          <AdminStudentDetail uid={selStu} users={users} setUsers={setUsers} onClose={()=>setSelStu(null)}/>
        )}
        {tab==='students'&&!selStu&&(
          <div style={{background:'white',borderRadius:'14px',overflow:'hidden',boxShadow:'0 2px 10px rgba(0,0,0,.06)'}}>
            <div style={{padding:'14px 18px',borderBottom:'1px solid #e5e7eb',display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:'8px'}}>
              <h2 style={{margin:0,fontSize:'.93rem',fontWeight:700}}>תלמידים ({users.filter(u=>(!gf||u.gender===gf)&&(!yf||u.year===yf)).length})</h2>
              <div style={{display:'flex',gap:'5px',flexWrap:'wrap'}}>
                {[['','הכל'],['female','נשים'],['male','גברים']].map(([g,l])=>(
                  <button key={g} onClick={()=>setGf(g)} style={{padding:'3px 10px',borderRadius:'12px',fontSize:'.76rem',fontWeight:700,border:'1px solid #e5e7eb',cursor:'pointer',background:gf===g?'#1E244B':'white',color:gf===g?'white':'#6b7280'}}>{l}</button>
                ))}
                {(gf==='male'?[['','כל השנים'],['2',"ב'"],['3',"ג'"]]: [['','כל השנים'],['2',"ב'"],['3',"ג'"],['4',"ד'"]]).map(([y,l])=>(
                  <button key={y} onClick={()=>setYf(y)} style={{padding:'3px 10px',borderRadius:'12px',fontSize:'.76rem',fontWeight:700,border:'1px solid #e5e7eb',cursor:'pointer',background:yf===y?'#1E244B':'white',color:yf===y?'white':'#6b7280'}}>{l}</button>
                ))}
              </div>
            </div>
            {!users.length?<p style={{textAlign:'center',color:'#9ca3af',padding:'36px'}}>טוען...</p>:(
              <div style={{overflowX:'auto'}}>
                <table style={{width:'100%',borderCollapse:'collapse',fontSize:'.85rem'}}>
                  <thead><tr style={{background:'#f9fafb'}}>{['שם','שנה','מגדר','אימייל','התנסות','הדרכות','הצגות מקרה','שינוי שנה','פעולות'].map(h=><th key={h} style={{padding:'10px 13px',textAlign:'right',fontWeight:700,color:'#374151',whiteSpace:'nowrap'}}>{h}</th>)}</tr></thead>
                  <tbody>{users.filter(u=>(!gf||u.gender===gf)&&(!yf||u.year===yf)).map((u,i)=>(
                    <tr key={u.id} style={{background:i%2===0?'white':'#fafafa',borderTop:'1px solid #e5e7eb'}}>
                      <td style={{padding:'10px 13px',fontWeight:600}}>{u.name}</td>
                      <td style={{padding:'10px 13px'}}>{YL[u.year]||u.year}</td>
                      <td style={{padding:'10px 13px'}}>{u.gender==='female'?'אשה':'איש'}</td>
                      <td style={{padding:'10px 13px',color:'#6b7280',fontSize:'.79rem'}}>{u.email}</td>
                      <td style={{padding:'10px 13px',fontWeight:600}}>{(u.practical||[]).length}</td>
                      <td style={{padding:'10px 13px',fontWeight:600}}>{(u.supervision||[]).length}</td>
                      <td style={{padding:'10px 13px',fontWeight:600}}>{(u.cases||[]).length}</td>
                      <td style={{padding:'10px 13px'}}>
                        <select value={u.year} onChange={e=>upYear(u.id,e.target.value)} style={{padding:'5px 8px',borderRadius:'7px',border:'1px solid #d1d5db',fontSize:'.81rem',fontFamily:'Assistant,sans-serif'}}>
                          <option value="2">שנה ב'</option><option value="3">שנה ג'</option><option value="4">שנה ד'</option>
                        </select>
                      </td>
                      <td style={{padding:'10px 13px'}}>
                        <div style={{display:'flex',gap:'5px'}}>
                          <button onClick={()=>setSelStu(u.id)}
                            style={{padding:'4px 9px',borderRadius:'7px',background:'rgba(99,102,241,.1)',color:'#6366f1',fontWeight:700,border:'1px solid rgba(99,102,241,.2)',cursor:'pointer',fontSize:'.79rem'}}>פרטים</button>
                          <button onClick={()=>{const n=prompt('שם חדש:',u.name);if(n&&n.trim()){const upd=users.map(x=>x.id===u.id?{...x,name:n.trim()}:x);setUsers(upd);db.collection('users').doc(u.id).update({name:n.trim()}).catch(console.error);}}}
                            style={{padding:'4px 9px',borderRadius:'7px',background:'rgba(74,111,165,.1)',color:'#1E244B',fontWeight:700,border:'1px solid rgba(74,111,165,.2)',cursor:'pointer',fontSize:'.79rem'}}>ערוך</button>
                          <button onClick={()=>{if(confirm(`למחוק את ${u.name}?`)){db.collection('users').doc(u.id).delete().then(()=>setUsers(users.filter(x=>x.id!==u.id))).catch(e=>alert('שגיאה: '+e.message));}}}
                            style={{padding:'4px 9px',borderRadius:'7px',background:'rgba(239,68,68,.1)',color:'#ef4444',fontWeight:700,border:'1px solid rgba(239,68,68,.2)',cursor:'pointer',fontSize:'.79rem'}}>מחק</button>
                        </div>
                      </td>
                    </tr>
                  ))}</tbody>
                </table>
              </div>
            )}
          </div>
        )}

        {tab==='files'&&(
          <div style={{background:'white',borderRadius:'14px',padding:'20px',boxShadow:'0 2px 10px rgba(0,0,0,.06)'}}>
            <h2 style={{margin:'0 0 16px',fontSize:'.97rem',fontWeight:700}}>קבצים שהועלו ({allFiles.length})</h2>
            {!allFiles.length?<p style={{color:'#9ca3af',textAlign:'center',padding:'28px'}}>אין קבצים עדיין</p>:(
              <div style={{display:'flex',flexDirection:'column',gap:'7px'}}>
                {allFiles.map((f,i)=>(
                  <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'11px 13px',borderRadius:'9px',background:'#f9fafb',border:'1px solid #e5e7eb',gap:'9px'}}>
                    <div>
                      <span style={{fontWeight:700,color:'#374151',fontSize:'.87rem'}}>{f.uname}</span>
                      <span style={{margin:'0 7px',padding:'1px 7px',borderRadius:'12px',background:'rgba(74,111,165,.1)',color:'#1E244B',fontSize:'.73rem',fontWeight:600}}>{f.cat}</span>
                      <span style={{fontSize:'.79rem',color:'#6b7280'}}>{f.name}</span>
                      {f.at&&<span style={{display:'block',fontSize:'.71rem',color:'#9ca3af',marginTop:'1px'}}>{new Date(f.at).toLocaleDateString('he-IL')}</span>}
                    </div>
                    <a href="#" onClick={e=>{e.preventDefault();openFileUrl(f.url,f.name);}} style={{padding:'5px 13px',borderRadius:'7px',background:'#1E244B',color:'white',fontSize:'.79rem',fontWeight:600,textDecoration:'none',whiteSpace:'nowrap',cursor:'pointer'}}>פתח</a>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {tab==='updates'&&(
          <div style={{background:'white',borderRadius:'14px',padding:'20px',boxShadow:'0 2px 10px rgba(0,0,0,.06)'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'16px'}}>
              <h2 style={{margin:0,fontSize:'.97rem',fontWeight:700}}>עדכונים ({updates.length})</h2>
              <button onClick={()=>setAddingUp(!addingUp)} style={{padding:'7px 16px',borderRadius:'9px',background:addingUp?'#ef4444':'#1E244B',color:'white',fontWeight:700,border:'none',cursor:'pointer',fontSize:'.84rem'}}>{addingUp?'ביטול':'+ עדכון חדש'}</button>
            </div>
            {addingUp&&(
              <div style={{padding:'18px',borderRadius:'11px',border:'2px solid #1E244B',marginBottom:'16px',background:'#f8faff'}}>
                <h3 style={{margin:'0 0 12px',fontSize:'.9rem',fontWeight:700,color:'#1e2a3a'}}>פרסום עדכון חדש</h3>
                <div style={{display:'flex',flexDirection:'column',gap:'10px'}}>
                  <div><label style={{display:'block',fontSize:'.8rem',fontWeight:700,marginBottom:'4px'}}>כותרת *</label><input type="text" value={upForm.title} onChange={e=>setUpForm({...upForm,title:e.target.value})} placeholder="כותרת העדכון" style={{width:'100%',padding:'9px 12px',borderRadius:'9px',border:'2px solid #e5e7eb',fontSize:'.88rem'}}/></div>
                  <div><label style={{display:'block',fontSize:'.8rem',fontWeight:700,marginBottom:'4px'}}>תוכן</label><textarea value={upForm.body} onChange={e=>setUpForm({...upForm,body:e.target.value})} rows={4} placeholder="תוכן העדכון..." style={{width:'100%',padding:'9px 12px',borderRadius:'9px',border:'2px solid #e5e7eb',fontSize:'.88rem',resize:'vertical'}}/></div>
                  <div><label style={{display:'block',fontSize:'.8rem',fontWeight:700,marginBottom:'4px'}}>קישור / סרטון (אופציונלי)</label><input type="url" value={upForm.url} onChange={e=>setUpForm({...upForm,url:e.target.value})} placeholder="https://..." dir="ltr" style={{width:'100%',padding:'9px 12px',borderRadius:'9px',border:'2px solid #e5e7eb',fontSize:'.88rem'}}/><p style={{margin:'3px 0 0',fontSize:'.72rem',color:'#6b7280'}}>קישורי YouTube ו-Google Drive יציגו תצוגה מקדימה אוטומטית</p></div>
                  <div><label style={{display:'block',fontSize:'.8rem',fontWeight:700,marginBottom:'4px'}}>פורסם ע"י</label><input type="text" value={upForm.author} onChange={e=>setUpForm({...upForm,author:e.target.value})} style={{width:'100%',padding:'9px 12px',borderRadius:'9px',border:'2px solid #e5e7eb',fontSize:'.88rem'}}/></div>
                  {upForm.url&&getYouTubeId(upForm.url)&&(
                    <div style={{borderRadius:'10px',overflow:'hidden',maxWidth:'320px'}}>
                      <p style={{fontSize:'.78rem',fontWeight:600,color:'#059669',margin:'0 0 5px'}}>תצוגה מקדימה:</p>
                      <img src={`https://img.youtube.com/vi/${getYouTubeId(upForm.url)}/hqdefault.jpg`} alt="preview" style={{width:'100%',borderRadius:'8px'}}/>
                    </div>
                  )}
                  {upForm.url&&getDriveFileId(upForm.url)&&!getYouTubeId(upForm.url)&&(
                    <div style={{borderRadius:'10px',overflow:'hidden',maxWidth:'320px'}}>
                      <p style={{fontSize:'.78rem',fontWeight:600,color:'#059669',margin:'0 0 5px'}}>תצוגה מקדימה של Drive:</p>
                      <iframe src={'https://drive.google.com/file/d/'+getDriveFileId(upForm.url)+'/preview'} style={{width:'100%',height:'200px',border:'none',borderRadius:'8px'}} allow="autoplay"/>
                    </div>
                  )}
                  <button onClick={addUpdate} disabled={savingUp} style={{padding:'10px',borderRadius:'10px',background:'linear-gradient(135deg,#1E244B,#524686)',color:'white',fontWeight:700,border:'none',cursor:'pointer',fontSize:'.88rem',opacity:savingUp?.6:1}}>{savingUp?'מפרסם...':'פרסם עדכון'}</button>
                </div>
              </div>
            )}
            {updates.length===0?<p style={{color:'#9ca3af',textAlign:'center',padding:'28px'}}>אין עדכונים</p>:
              <div style={{display:'flex',flexDirection:'column',gap:'9px'}}>
                {updates.map(up=>editingUp&&editingUp.id===up.id?(
                  <div key={up.id} style={{padding:'15px',borderRadius:'10px',background:'#fffbeb',border:'2px solid #f59e0b'}}>
                    <div style={{display:'flex',flexDirection:'column',gap:'8px'}}>
                      <input type="text" value={editingUp.title} onChange={e=>setEditingUp({...editingUp,title:e.target.value})} style={{width:'100%',padding:'8px 10px',borderRadius:'8px',border:'2px solid #e5e7eb',fontSize:'.88rem',fontWeight:700}}/>
                      <textarea value={editingUp.body||''} onChange={e=>setEditingUp({...editingUp,body:e.target.value})} rows={3} style={{width:'100%',padding:'8px 10px',borderRadius:'8px',border:'2px solid #e5e7eb',fontSize:'.85rem',resize:'vertical'}}/>
                      <input type="url" value={editingUp.url||''} onChange={e=>setEditingUp({...editingUp,url:e.target.value})} placeholder="קישור (אופציונלי)" dir="ltr" style={{width:'100%',padding:'8px 10px',borderRadius:'8px',border:'2px solid #e5e7eb',fontSize:'.85rem'}}/>
                      <input type="text" value={editingUp.author||''} onChange={e=>setEditingUp({...editingUp,author:e.target.value})} placeholder="פורסם ע״י" style={{width:'100%',padding:'8px 10px',borderRadius:'8px',border:'2px solid #e5e7eb',fontSize:'.85rem'}}/>
                      <div style={{display:'flex',gap:'8px'}}>
                        <button onClick={saveEditUpdate} disabled={savingUp} style={{padding:'7px 18px',borderRadius:'8px',background:'#059669',color:'white',fontWeight:700,border:'none',cursor:'pointer',fontSize:'.82rem',opacity:savingUp?.6:1}}>{savingUp?'שומר...':'שמור'}</button>
                        <button onClick={()=>setEditingUp(null)} style={{padding:'7px 18px',borderRadius:'8px',background:'#e5e7eb',color:'#374151',fontWeight:700,border:'none',cursor:'pointer',fontSize:'.82rem'}}>ביטול</button>
                      </div>
                    </div>
                  </div>
                ):(
                  <div key={up.id} style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',padding:'13px 15px',borderRadius:'10px',background:'#f9fafb',border:'1px solid #e5e7eb'}}>
                    <div style={{flex:1}}>
                      <p style={{margin:'0 0 3px',fontWeight:700,fontSize:'.88rem',color:'#1e2a3a'}}>{up.title}</p>
                      {up.body&&<p style={{margin:'0 0 3px',fontSize:'.82rem',color:'#6b7280',whiteSpace:'pre-line',maxHeight:'60px',overflow:'hidden'}}>{up.body}</p>}
                      <div style={{display:'flex',gap:'10px',fontSize:'.73rem',color:'#9ca3af'}}>
                        <span>{up.createdAt?new Date(up.createdAt).toLocaleDateString('he-IL'):''}</span>
                        {up.author&&<span>ע"י {up.author}</span>}
                        {up.url&&<span style={{color:'#1E244B'}}>+ קישור</span>}
                      </div>
                    </div>
                    <div style={{display:'flex',gap:'6px',flexShrink:0,marginRight:'10px'}}>
                      <button onClick={()=>setEditingUp({...up})} style={{padding:'4px 10px',borderRadius:'7px',background:'rgba(59,130,246,.1)',color:'#3b82f6',fontWeight:700,border:'1px solid rgba(59,130,246,.2)',cursor:'pointer',fontSize:'.75rem'}}>ערוך</button>
                      <button onClick={()=>delUpdate(up.id)} style={{padding:'4px 10px',borderRadius:'7px',background:'rgba(239,68,68,.1)',color:'#ef4444',fontWeight:700,border:'1px solid rgba(239,68,68,.2)',cursor:'pointer',fontSize:'.75rem'}}>מחק</button>
                    </div>
                  </div>
                ))}
              </div>
            }
          </div>
        )}

        {tab==='settings'&&(
          <div style={{display:'flex',flexDirection:'column',gap:'12px'}}>
            <div style={{background:'white',borderRadius:'13px',padding:'20px',boxShadow:'0 2px 10px rgba(0,0,0,.06)'}}>
              <h2 style={{margin:'0 0 13px',fontSize:'.97rem',fontWeight:700}}>סיסמאות כניסה</h2>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'14px'}}>
                <div>
                  <label style={{display:'block',fontSize:'.79rem',fontWeight:700,color:'#374151',marginBottom:'4px'}}>סיסמת מנהל</label>
                  <input type="text" value={editAdminPw} onChange={e=>{setEditAdminPw(e.target.value);setDirty(true);}}
                    style={{width:'100%',padding:'10px 13px',border:'2px solid #e5e7eb',borderRadius:'9px',fontFamily:'monospace',fontWeight:600}}/>
                </div>
                <div>
                  <label style={{display:'block',fontSize:'.79rem',fontWeight:700,color:'#374151',marginBottom:'4px'}}>סיסמת מחנך</label>
                  <input type="text" value={editTeacherPw} onChange={e=>{setEditTeacherPw(e.target.value);setDirty(true);}}
                    style={{width:'100%',padding:'10px 13px',border:'2px solid #e5e7eb',borderRadius:'9px',fontFamily:'monospace',fontWeight:600}}/>
                </div>
              </div>
            </div>
            <div style={{background:'white',borderRadius:'13px',padding:'20px',boxShadow:'0 2px 10px rgba(0,0,0,.06)'}}>
              <h2 style={{margin:'0 0 10px',fontSize:'.97rem',fontWeight:700}}>גיבוי נתונים</h2>
              <button onClick={()=>{const b=new Blob([JSON.stringify({users,adminPw,teacherPw},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`backup-${new Date().toISOString().split('T')[0]}.json`;a.click();}}
                style={{padding:'10px 20px',borderRadius:'9px',background:'#059669',color:'white',fontWeight:700,border:'none',cursor:'pointer'}}>הורד גיבוי JSON</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ══════════ TEACHER STUDENT DETAIL ══════════
function TeacherStudentDetail({u,stuUploads,setUploads}){
  const [tab,setTab]=useState('overview');
  useEffect(()=>setTab('overview'),[u.id]);
  const isFem=u.gender==='female';
  const yr=parseInt(u.year);
  const practFlds=[['open','כיצד התחילה הפגישה וכיצד הסתיימה?'],['topics','רצף הנושאים שעלו'],['position','עמדת הנועץ/ת ושינויים'],['focus','נקודות מיקוד ומה פעל הזזה'],['insights','תובנות והחלטות'],['challenge','קושי מרכזי ויעד הבא'],['lessons','לקחים אישיים']];
  const supFlds=[['topics','נושאים שנדונו'],['feedback','משוב מהמדריך/ה'],['contribution','תרומה להתפתחותך'],['challenges','אתגרים שעלו'],['selfLearn','מה למדת על עצמך'],['goals','יעדים לפגישה הבאה'],['lessons','לקחים']];
  const tabs=[
    {id:'overview',l:'סקירה'},
    {id:'practical',l:`התנסות (${(u.practical||[]).length})`},
    {id:'supervision',l:`הדרכות (${(u.supervision||[]).length})`},
    {id:'cases',l:`הצגות מקרה (${(u.cases||[]).length})`},
    {id:'proficiency',l:`בקיאות (${(u.proficiency||[]).length})`},
    {id:'final',l:'עבודה מסכמת'},
    {id:'files',l:`קבצים (${stuUploads.length})`},
  ];
  const FieldBlock=({label,value})=>value?(<div style={{marginBottom:'7px'}}><p style={{margin:'0 0 2px',fontSize:'.7rem',fontWeight:700,color:'#9ca3af',letterSpacing:'.3px'}}>{label}</p><p style={{margin:0,fontSize:'.85rem',color:'#374151',whiteSpace:'pre-line',lineHeight:'1.5'}}>{value}</p></div>):null;
  const SectionCard=({header,color,bg,children})=>(<div style={{borderRadius:'10px',border:'1px solid #e5e7eb',marginBottom:'10px',overflow:'hidden'}}><div style={{background:bg,padding:'9px 14px',borderBottom:'1px solid #e5e7eb'}}>{header}</div><div style={{padding:'13px'}}>{children}</div></div>);
  const EmptyMsg=({t})=>(<p style={{color:'#9ca3af',textAlign:'center',padding:'28px 0',fontSize:'.87rem'}}>{t}</p>);
  return(
    <div style={{background:'white',borderRadius:'12px',padding:'18px',boxShadow:'0 2px 8px rgba(0,0,0,.06)',overflowY:'auto',maxHeight:'calc(100vh - 140px)'}}>
      <h2 style={{margin:'0 0 2px',fontSize:'1.05rem',fontWeight:800,color:'#1e2a3a'}}>{u.name}</h2>
      <p style={{margin:'0 0 14px',fontSize:'.8rem',color:'#6b7280'}}>{u.email}</p>
      <div style={{display:'flex',gap:'4px',flexWrap:'wrap',marginBottom:'14px',borderBottom:'2px solid #f3f4f6',paddingBottom:'10px'}}>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{padding:'5px 11px',borderRadius:'7px',fontWeight:600,border:'none',cursor:'pointer',fontSize:'.77rem',background:tab===t.id?'#1E244B':'#f3f4f6',color:tab===t.id?'white':'#6b7280',transition:'background .15s'}}>
            {t.l}
          </button>
        ))}
      </div>

      {tab==='overview'&&(
        <div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(120px,1fr))',gap:'8px',marginBottom:'14px'}}>
            {[['התנסות',(u.practical||[]).length,'#1E244B','practical'],['הדרכות',(u.supervision||[]).length,'#524686','supervision'],['הצגות מקרה',(u.cases||[]).length,'#765C74','cases'],['בקיאות',(u.proficiency||[]).length,'#C4896E','proficiency']].map(([l,n,col,tid])=>(
              <div key={l} style={{padding:'10px',borderRadius:'9px',background:col+'15',borderRight:`3px solid ${col}`,cursor:'pointer'}} onClick={()=>setTab(tid)}>
                <p style={{margin:'0 0 2px',fontSize:'.7rem',color:'#6b7280',fontWeight:600}}>{l}</p>
                <p style={{margin:0,fontSize:'1.4rem',fontWeight:800,color:col,lineHeight:1}}>{n}</p>
              </div>
            ))}
          </div>
          {u.finalProject&&(
            <div style={{padding:'10px 13px',borderRadius:'9px',background:'rgba(16,185,129,.07)',border:'1px solid rgba(16,185,129,.2)',marginBottom:'10px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div><p style={{margin:'0 0 1px',fontWeight:700,color:'#059669',fontSize:'.85rem'}}>עבודה מסכמת הועלתה</p><p style={{margin:0,fontSize:'.76rem',color:'#6b7280'}}>{u.finalProject.name}</p></div>
              <a href="#" onClick={e=>{e.preventDefault();openFileUrl(u.finalProject.url,u.finalProject.name);}} style={{padding:'5px 12px',borderRadius:'7px',background:'#059669',color:'white',fontSize:'.79rem',fontWeight:600,textDecoration:'none',cursor:'pointer'}}>פתח</a>
            </div>
          )}
          {stuUploads.filter(up=>!up.seen).length>0&&(
            <div style={{padding:'8px 13px',borderRadius:'9px',background:'rgba(249,115,22,.07)',border:'1px solid rgba(249,115,22,.2)'}}>
              <span style={{fontWeight:700,color:'#ea580c',fontSize:'.83rem'}}>● {stuUploads.filter(up=>!up.seen).length} קבצים חדשים שלא נצפו</span>
            </div>
          )}
        </div>
      )}

      {tab==='practical'&&(
        <div>
          {!(u.practical||[]).length?<EmptyMsg t="טרם דווחו שעות התנסות"/>:
          (u.practical||[]).map((r,i)=>(
            <SectionCard key={r.id||i} bg="#eff6ff" header={
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span style={{fontWeight:700,fontSize:'.87rem',color:'#1e40af'}}>מפגש #{r.num}</span>
                <span style={{fontSize:'.78rem',color:'#6b7280'}}>{r.date?new Date(r.date).toLocaleDateString('he-IL'):''}</span>
              </div>
            }>
              {practFlds.map(([k,l])=><FieldBlock key={k} label={l} value={r[k]}/>)}
              {(r.atts||[r.att]).filter(Boolean).map((att,ai)=><div key={ai} style={{marginTop:'6px',padding:'6px 10px',borderRadius:'7px',background:'rgba(16,185,129,.07)',border:'1px solid rgba(16,185,129,.2)'}}>
                <a href="#" onClick={e=>{e.preventDefault();openFileUrl(att.url,att.name);}} style={{color:'#059669',fontSize:'.81rem',fontWeight:600,textDecoration:'none',cursor:'pointer'}}>📄 {att.name}</a>
              </div>)}
            </SectionCard>
          ))}
        </div>
      )}

      {tab==='supervision'&&(
        <div>
          {!(u.supervision||[]).length?<EmptyMsg t="טרם דווחו הדרכות אישיות"/>:
          (u.supervision||[]).map((r,i)=>(
            <SectionCard key={r.id||i} bg="#f0fdf4" header={
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span style={{fontWeight:700,fontSize:'.87rem',color:'#166534'}}>הדרכה #{i+1}{r.inst?` — ${r.inst}`:''}</span>
                <span style={{fontSize:'.78rem',color:'#6b7280'}}>{r.date?new Date(r.date).toLocaleDateString('he-IL'):''}</span>
              </div>
            }>
              {supFlds.map(([k,l])=><FieldBlock key={k} label={l} value={r[k]}/>)}
            </SectionCard>
          ))}
        </div>
      )}

      {tab==='cases'&&(
        <div>
          {!(u.cases||[]).length?<EmptyMsg t="טרם הועלו הצגות מקרה"/>:
          (u.cases||[]).map((c,i)=>(
            <div key={c.id||i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'11px 14px',borderRadius:'9px',background:'rgba(139,92,246,.05)',border:'1px solid rgba(139,92,246,.15)',marginBottom:'7px'}}>
              <div><p style={{margin:'0 0 2px',fontWeight:600,fontSize:'.87rem',color:'#374151'}}>{c.name}</p><p style={{margin:0,fontSize:'.73rem',color:'#9ca3af'}}>{c.at?new Date(c.at).toLocaleDateString('he-IL'):''}</p></div>
              <a href="#" onClick={e=>{e.preventDefault();openFileUrl(c.url,c.name);}} style={{padding:'5px 12px',borderRadius:'7px',background:'#524686',color:'white',fontSize:'.79rem',fontWeight:600,textDecoration:'none',flexShrink:0,cursor:'pointer'}}>פתח</a>
            </div>
          ))}
        </div>
      )}


      {tab==='proficiency'&&(
        <div>
          {!(u.proficiency||[]).length?<EmptyMsg t="טרם נוספו מבחני בקיאות"/>:
          (u.proficiency||[]).map((t,i)=>(

              </div>
              <a href="#" onClick={e=>{e.preventDefault();if(!up.seen){db.collection('uploads').doc(up.id).update({seen:true}).catch(()=>{});setUploads(prev=>prev.map(x=>x.id===up.id?{...x,seen:true}:x));}openFileUrl(up.url,up.fileName);}}

    </div>

}

        {gender&&year&&(

        </div>
      </div>
      </div>



    </div>

// ══════════ DASHBOARD ══════════
function Dashboard({user,setView,req,siteC,unreadCount}){
  const yr=parseInt(user.year),isFem=user.gender==='female';

  const cards=[
    {id:'practical',l:'שעות התנסות',done:(user.practical||[]).length,req:req.p||0,c:'#1E244B'},

    {id:'case',l:'הצגת מקרה',done:(user.cases||[]).length,req:req.c||1,c:'#765C74'},
    ...(isFem&&yr===4?[
      {id:'proficiency',l:'מבחני בקיאות',done:(user.proficiency||[]).length,req:req.pr||2,c:'#C4896E'},
      {id:'finalwork',l:'עבודה מסכמת',done:user.finalProject?1:0,req:1,c:'#E88F6A'},

    <div style={{display:'flex',flexDirection:'column',gap:'20px'}}>
      {unreadCount>0&&(
        <div onClick={()=>setView('updates')} style={{padding:'14px 20px',borderRadius:'12px',background:'linear-gradient(135deg,#E88F6A,#A87071)',color:'white',cursor:'pointer',display:'flex',alignItems:'center',gap:'12px',boxShadow:'0 4px 14px rgba(232,143,106,.35)',animation:'fadeSlideUp .4s ease both'}}>
          <span style={{background:'rgba(255,255,255,.25)',borderRadius:'50%',width:'32px',height:'32px',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1.1rem',fontWeight:800,flexShrink:0}}>{unreadCount}</span>
          <div><p style={{margin:0,fontWeight:700,fontSize:'.92rem'}}>יש {unreadCount} עדכונים חדשים!</p><p style={{margin:'2px 0 0',fontSize:'.78rem',opacity:.9}}>לחצו כאן לצפייה בעדכונים</p></div>
        </div>
      )}
      {/* HERO */}
      <div style={{borderRadius:'16px',padding:'16px 28px',
        background:'linear-gradient(135deg,#1E244B 0%,#524686 40%,#765C74 70%,#A87071 100%)',color:'white'}}>
        <h2 style={{margin:'0 0 4px',fontSize:'1.3rem',fontWeight:800}}>
          {(siteC.welcomeTitle||'שלום, {name}!').replace('{name}',user.name)}
        </h2>
        <p style={{margin:'0 0 10px',opacity:.88,fontSize:'.88rem'}}>
          {siteC.welcomeSub||'ברוכים הבאים ליומן ההכשרה'} — {yl}
        </p>
        <div style={{display:'flex',gap:'8px',flexWrap:'wrap'}}>
          {cards.map(c=>{
            const pct=c.req>0?Math.round(Math.min(100,(c.done/c.req)*100)):0;
            return <span key={c.id} style={{padding:'3px 12px',borderRadius:'20px',fontSize:'.75rem',fontWeight:600,
              background:pct===100?'rgba(255,255,255,0.28)':'rgba(255,255,255,0.15)'}}>
              {c.l}: {pct}%{pct===100?' ✓':''}
            </span>;
          })}
        </div>
      </div>

      {/* STAT CARDS */}
      <div>
        <h3 style={{fontSize:'.93rem',fontWeight:700,color:'var(--txt)',margin:'0 0 12px'}}>חובות לימוד — {yl}</h3>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(240px,1fr))',gap:'18px',width:'100%'}}>
          {cards.map(c=>{
            const pct=c.req>0?Math.min(100,(c.done/c.req)*100):0;
            return(
              <div key={c.id} onClick={()=>setView(c.id)} className="stat-card"
                style={{borderRight:`4px solid ${c.c}`}}>
                <p style={{margin:'0 0 8px',fontSize:'.79rem',fontWeight:600,color:'var(--sub)'}}>{c.l}</p>
                <div style={{display:'flex',alignItems:'baseline',gap:'4px',marginBottom:'10px'}}>
                  <span style={{fontSize:'2rem',fontWeight:800,color:'var(--txt)',lineHeight:1}}>{c.done}</span>
                  <span style={{fontSize:'.9rem',color:'var(--sub)'}}>/ {c.req}</span>
                </div>
                <div style={{height:'5px',borderRadius:'999px',background:'var(--trk)'}}>
                  <div style={{height:'5px',borderRadius:'999px',width:`${pct}%`,background:c.c,transition:'width .7s ease'}}/>
                </div>
                <p style={{fontSize:'.71rem',color:'var(--sub)',margin:'4px 0 0'}}>{Math.round(pct)}% הושלם</p>
              </div>

      {/* REQUIREMENTS */}
      <div style={{borderRadius:'12px',padding:'12px 18px',
        background:`linear-gradient(135deg,var(--hf),var(--ht))`,color:'white'}}>
        <h3 style={{margin:'0 0 8px',fontSize:'.9rem',fontWeight:700}}>דרישות {yl}</h3>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(165px,1fr))',gap:'7px'}}>
          {[[req.p||0,'שעות התנסות'],[req.s||0,'הדרכות אישיות'],[req.c||1,`הצגת מקרה${(req.c||1)>1?` (${req.c||1})`:''}`],
            ...(isFem&&yr===4?[[req.pr||2,'מבחני בקיאות'],['✓','עבודה מסכמת']]:[])
          ].map(([n,l])=>(
            <div key={l} style={{padding:'9px 13px',background:'rgba(255,255,255,0.14)',borderRadius:'9px',display:'flex',alignItems:'center',gap:'7px'}}>
              <span style={{fontWeight:800,fontSize:'1rem'}}>{n}</span>
              <span style={{fontSize:'.79rem',opacity:.9}}>{l}</span>
            </div>
          ))}
        </div>
      </div>

      {/* YEAR HISTORY */}
      {(user.yearHistory||[]).length>0&&(
        <div className="card" style={{padding:'20px'}}>
          <h3 style={{margin:'0 0 12px',fontSize:'.92rem',fontWeight:700,color:'var(--txt)'}}>נתוני שנים קודמות</h3>
          {(user.yearHistory||[]).map((h,i)=>(
            <div key={i} style={{padding:'10px 13px',borderRadius:'10px',marginBottom:'7px',background:'rgba(74,111,165,0.06)',border:'1px solid rgba(74,111,165,0.13)'}}>
              <p style={{margin:'0 0 5px',fontWeight:700,fontSize:'.87rem',color:'var(--txt)'}}>{YL[h.year]||`שנה ${h.year}`}{h.at?` — ${new Date(h.at).toLocaleDateString('he-IL')}`:''}</p>
              <div style={{display:'flex',gap:'12px',flexWrap:'wrap',fontSize:'.79rem',color:'var(--sub)'}}>
                <span>התנסות: <b>{h.practical||0}</b></span><span>הדרכות: <b>{h.supervision||0}</b></span>
                <span>הצגות: <b>{h.cases||0}</b></span>              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}
// ══════════ SHARED UI ══════════
function SH({title,sub,done,total,color,onAdd,adding}){
  const pct=total>0?Math.min(100,Math.round((done/total)*100)):0;
  return(
    <div className="card" style={{padding:'20px',marginBottom:'16px'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'12px',flexWrap:'wrap',gap:'8px'}}>
        <div>
          <h2 style={{margin:'0 0 2px',fontSize:'1.25rem',fontWeight:800,color:'var(--txt)'}}>{title}</h2>
          {sub&&<p style={{margin:0,fontSize:'.8rem',color:'var(--sub)'}}>{sub}</p>}
        </div>
        <button onClick={onAdd} className="btn-p"
          style={{padding:'9px 18px',borderRadius:'10px',fontWeight:700,fontSize:'.87rem',border:'none',cursor:'pointer'}}>
          {adding?'סגור':'+ דיווח חדש'}
        </button>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:'9px'}}>
        <div style={{flex:1,height:'6px',borderRadius:'999px',background:'var(--trk)'}}>
          <div style={{height:'6px',borderRadius:'999px',width:`${pct}%`,background:`linear-gradient(90deg,${color}88,${color})`,transition:'width .7s'}}/>
        </div>
        <span style={{fontWeight:700,fontSize:'.87rem',color:'var(--txt)'}}>{done}/{total}</span>
        <span style={{fontSize:'.76rem',color:'var(--sub)'}}>{pct}%</span>
      </div>
    </div>
  );
}
function FL({label,req,children}){return(<div><label className={`fl-label${req?' req':''}`}>{label}</label>{children}</div>);}
function RS({title,content}){
  if(!content)return null;
  return(<div style={{borderRight:'3px solid var(--a1)',paddingRight:'11px'}}>
    <p style={{margin:'0 0 3px',fontSize:'.7rem',fontWeight:700,color:'var(--sub)',textTransform:'uppercase',letterSpacing:'.4px'}}>{title}</p>
    <p style={{margin:0,fontSize:'.85rem',color:'var(--txt)',whiteSpace:'pre-wrap',lineHeight:1.55,padding:'7px 10px',background:'rgba(0,0,0,.025)',borderRadius:'7px'}}>{content}</p>
  </div>);
}
function RC({badge,bc,meta,onEdit,onDelete,expanded,onToggle,children,preview}){
  return(
    <div className="card" style={{padding:'16px',marginBottom:'9px'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'9px'}}>
        <div style={{display:'flex',alignItems:'center',gap:'7px',flexWrap:'wrap'}}>
          <span style={{padding:'2px 9px',borderRadius:'20px',fontSize:'.75rem',fontWeight:700,background:`${bc}18`,color:bc}}>{badge}</span>
          {meta&&<span style={{fontSize:'.79rem',color:'var(--sub)'}}>{meta}</span>}
        </div>
        <div style={{display:'flex',gap:'5px'}}>
          <button onClick={onEdit} style={{padding:'4px 9px',borderRadius:'7px',background:'rgba(74,111,165,.1)',color:'var(--a1)',fontWeight:600,border:'none',cursor:'pointer',fontSize:'.77rem'}}>ערוך</button>
          <button onClick={onDelete} style={{padding:'4px 9px',borderRadius:'7px',background:'rgba(239,68,68,.08)',color:'#ef4444',fontWeight:600,border:'none',cursor:'pointer',fontSize:'.77rem'}}>מחק</button>
        </div>
      </div>
      {expanded?children:<p style={{margin:'0 0 5px',fontSize:'.84rem',color:'var(--sub)',overflow:'hidden',display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical'}}>{preview}</p>}
      <button onClick={onToggle} style={{background:'none',border:'none',color:'var(--a1)',cursor:'pointer',fontWeight:600,fontSize:'.78rem',padding:'3px 0'}}>{expanded?'הסתר ▲':'הצג מלא ▼'}</button>
    </div>
  );
}
function UB({onUpload,uploading,label,progress}){
  const r=40,c=2*Math.PI*r,pct=progress||0,off=c-(pct/100)*c;
  return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:'8px'}}>
      {!uploading?(
        <label style={{cursor:'pointer'}}>
          <span className="btn-p" style={{display:'inline-block',padding:'8px 17px',borderRadius:'10px',fontWeight:700,fontSize:'.85rem',cursor:'pointer'}}>
            {label||'העלה קובץ (PDF / Word)'}
          </span>
          <input type="file" accept=".pdf,.doc,.docx" onChange={onUpload} disabled={uploading} style={{display:'none'}}/>
        </label>
      ):(
        <div style={{position:'relative',width:'90px',height:'90px',display:'flex',alignItems:'center',justifyContent:'center'}}>
          <svg width="90" height="90" style={{transform:'rotate(-90deg)'}}>
            <circle cx="45" cy="45" r={r} fill="none" stroke="#e5e7eb" strokeWidth="6"/>
            <circle cx="45" cy="45" r={r} fill="none" stroke="var(--a1)" strokeWidth="6"
              strokeDasharray={c} strokeDashoffset={progress!=null?off:0}
              strokeLinecap="round" style={{transition:'stroke-dashoffset .4s ease'}}/>
            {progress==null&&<circle cx="45" cy="45" r={r} fill="none" stroke="var(--a1)" strokeWidth="6"
              strokeDasharray={`${c*0.25} ${c*0.75}`} strokeLinecap="round">
              <animateTransform attributeName="transform" type="rotate" from="0 45 45" to="360 45 45" dur="1s" repeatCount="indefinite"/>
            </circle>}
          </svg>
          <div style={{position:'absolute',textAlign:'center'}}>
            <div style={{fontWeight:800,fontSize:'1rem',color:'var(--txt)'}}>{progress!=null?`${pct}%`:'...'}</div>
            <div style={{fontSize:'.65rem',color:'var(--sub)'}}>מעלה</div>
          </div>
        </div>
      )}
    </div>
  );
}

// ══════════ PRACTICAL HOURS ══════════
function PracticalHours({user,updateUser,req}){
  const ef={date:'',num:'',open:'',topics:'',position:'',focus:'',insights:'',challenge:'',lessons:''};
  const [show,setShow]=useState(false),[editIdx,setEditIdx]=useState(null),[expIdx,setExpIdx]=useState(null),[ul,setUl]=useState(false),[form,setForm]=useState(ef);
  const reset=()=>{setForm(ef);setShow(false);setEditIdx(null);};
  const save=e=>{e.preventDefault();const a=[...(user.practical||[])];if(editIdx!==null)a[editIdx]={...form,id:a[editIdx].id,atts:a[editIdx].atts||((a[editIdx].att)?[a[editIdx].att]:[])};else a.push({...form,id:Date.now().toString(),atts:[]});updateUser({practical:a});reset();alert('הדיווח נשמר');};
  const [prog,setProg]=useState(null);
  const getAtts=r=>{if(r.atts&&r.atts.length)return r.atts;if(r.att)return[r.att];return[];};
  const attach=async(e,i)=>{const f=e.target.files[0];if(!f)return;const ext1=(f.name.split('.').pop()||'').toLowerCase();if(!['pdf','doc','docx'].includes(ext1)){alert('PDF או Word בלבד');return;}const cur=getAtts((user.practical||[])[i]);if(cur.length>=3){alert('מקסימום 3 קבצים לדיווח');return;}setUl(true);setProg(0);try{const r=await upFile(f,user.id,'practical',p=>setProg(p));const a=[...(user.practical||[])];a[i]={...a[i],atts:[...cur,r]};updateUser({practical:a});alert('קובץ הועלה');}catch(e){console.error(e);alert('שגיאה בהעלאה: '+(e.message||e.code||String(e)));}setUl(false);setProg(null);e.target.value='';}; 
  const flds=[['open','כיצד התחילה הפגישה וכיצד הסתיימה?'],['topics','רצף הנושאים שעלו'],['position','עמדת הנועץ/ת ושינויים'],['focus','נקודות מיקוד ומה פעל הזזה'],['insights','תובנות והחלטות'],['challenge','קושי מרכזי ויעד הבא'],['lessons','לקחים אישיים']];
  return(<div>
    <SH title="שעות התנסות מעשית" sub="דיווח והתבוננות על תהליך הייעוץ" done={(user.practical||[]).length} total={req.p||0} color="#1E244B" onAdd={()=>setShow(!show)} adding={show} />
    {show&&(<div className="card" style={{padding:'22px',marginBottom:'14px'}}>
      <h3 style={{margin:'0 0 14px',fontSize:'.97rem',fontWeight:700,color:'var(--txt)'}}>{editIdx!==null?'עריכת דיווח':'דיווח חדש'}</h3>
      <form onSubmit={save} style={{display:'flex',flexDirection:'column',gap:'12px'}}>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px'}}>
          <FL label="תאריך" req><input type="date" required value={form.date} onChange={e=>setForm({...form,date:e.target.value})}/></FL>
          <FL label="מספר מפגש" req><input type="number" min="1" required value={form.num} onChange={e=>setForm({...form,num:e.target.value})}/></FL>
        </div>
        {flds.map(([k,l])=><FL key={k} label={l} req><textarea required value={form[k]} rows={3} onChange={e=>setForm({...form,[k]:e.target.value})} style={{resize:'vertical'}}/></FL>)}

function UpdatesPage({user,updateUser,updates}){
  const readUps=user.readUpdates||[];
  const markRead=id=>{
    if(!readUps.includes(id)){
      const nr=[...readUps,id];
      updateUser({readUpdates:nr});
      db.collection('users').doc(user.id).update({readUpdates:nr}).catch(console.error);
    }
  };
  useEffect(()=>{
    const unread=updates.filter(u=>!readUps.includes(u.id));
    if(unread.length>0){
      const nr=[...readUps,...unread.map(u=>u.id)];
      updateUser({readUpdates:nr});
      db.collection('users').doc(user.id).update({readUpdates:nr}).catch(console.error);
    }
  },[]);
  return(
    <div>
      <h2 style={{fontSize:'1.25rem',fontWeight:800,color:'var(--txt)',margin:'0 0 16px'}}>עדכונים</h2>
      {updates.length===0?
        <div className="card" style={{padding:'40px',textAlign:'center'}}>
          <p style={{color:'var(--sub)',fontSize:'.9rem'}}>אין עדכונים כרגע</p>
        </div>
      :updates.map(up=>{
        const isNew=!readUps.includes(up.id);
        const ytId=getYouTubeId(up.url);
        const driveId=getDriveFileId(up.url);
        return(
          <div key={up.id} className="card" style={{padding:'20px',marginBottom:'14px',borderRight:isNew?'4px solid #ef4444':'4px solid transparent',position:'relative'}}>
            {isNew&&<span style={{position:'absolute',top:'12px',left:'12px',background:'#ef4444',color:'white',padding:'2px 9px',borderRadius:'12px',fontSize:'.7rem',fontWeight:700}}>חדש</span>}
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'10px'}}>
              <h3 style={{margin:0,fontSize:'1rem',fontWeight:700,color:'var(--txt)'}}>{up.title}</h3>
              <span style={{fontSize:'.73rem',color:'var(--sub)',whiteSpace:'nowrap',marginRight:'10px'}}>{up.createdAt?new Date(up.createdAt).toLocaleDateString('he-IL',{day:'numeric',month:'long',year:'numeric'}):''}</span>
            </div>
            {up.body&&<p style={{margin:'0 0 12px',fontSize:'.88rem',color:'var(--txt)',lineHeight:1.6,whiteSpace:'pre-line'}}>{up.body}</p>}
            {ytId&&(
              <div style={{marginBottom:'12px',borderRadius:'12px',overflow:'hidden',position:'relative',cursor:'pointer',maxWidth:'480px'}}
                onClick={()=>window.open(up.url,'_blank')}>
                <img src={`https://img.youtube.com/vi/${ytId}/hqdefault.jpg`} alt="תצוגה מקדימה"
                  style={{width:'100%',display:'block',borderRadius:'12px'}}/>
                <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',background:'rgba(0,0,0,.25)'}}>
                  <div style={{width:'60px',height:'60px',borderRadius:'50%',background:'rgba(255,0,0,.85)',display:'flex',alignItems:'center',justifyContent:'center'}}>
                    <div style={{width:0,height:0,borderTop:'14px solid transparent',borderBottom:'14px solid transparent',borderLeft:'22px solid white',marginLeft:'4px'}}/>
                  </div>
                </div>
              </div>
            )}
            {driveId&&!ytId&&(
              <div style={{marginBottom:'12px',borderRadius:'12px',overflow:'hidden',maxWidth:'480px'}}>
                <iframe src={'https://drive.google.com/file/d/'+driveId+'/preview'} style={{width:'100%',height:'300px',border:'none',borderRadius:'12px'}} allow="autoplay"/>
              </div>
            )}
            {up.url&&!ytId&&!driveId&&(
              <a href={up.url} target="_blank" style={{display:'inline-flex',alignItems:'center',gap:'6px',padding:'8px 16px',borderRadius:'9px',background:'linear-gradient(135deg,var(--a1),var(--a2))',color:'white',textDecoration:'none',fontWeight:600,fontSize:'.84rem'}}>
                פתח קישור
              </a>
            )}
            <div style={{marginTop:'8px',fontSize:'.73rem',color:'var(--sub)'}}>
              {up.author&&<span>פורסם ע"י {up.author}</span>}
            </div>
          </div>
        );
      })}
    </div>
  );
}
