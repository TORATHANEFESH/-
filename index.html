            100% { transform: translateY(0px) translateX(0px); }

            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.15; }

            const [users, setUsers] = useState([]);
            const [currentUser, setCurrentUser] = useState(null);
            const [view, setView] = useState('dashboard');
            const [announcements, setAnnouncements] = useState([]);
            const [adminPassword, setAdminPassword] = useState('1234');
            const [isAdmin, setIsAdmin] = useState(false);
            const [logoClickTime, setLogoClickTime] = useState(null);
            const [footerLinks, setFooterLinks] = useState([]);

            useEffect(() => {
                // טעינת משתמשים מ-Firestore
                db.collection('users').get().then(snapshot => {
                    const loadedUsers = [];
                    snapshot.forEach(doc => {
                        loadedUsers.push({ id: doc.id, ...doc.data() });
                    });
                    setUsers(loadedUsers);
                }).catch(err => console.error('שגיאה בטעינת משתמשים:', err));
            }, []);

            useEffect(() => {
                // שמירה אוטומטית של שינויים בFirestore
                if (users.length > 0) {
                    users.forEach(user => {
                        db.collection('users').doc(user.id).set(user)
                            .catch(err => console.error('שגיאה בשמירת משתמש:', err));
                    });
                }
            }, [users]);

            useEffect(() => {
                // טעינת הגדרות מ-Firestore
                db.collection('settings').doc('general').get().then(doc => {
                    if (doc.exists) {
                        const data = doc.data();
                        if (data.announcements) setAnnouncements(data.announcements);
                        if (data.adminPassword) setAdminPassword(data.adminPassword);
                        if (data.footerLinks) setFooterLinks(data.footerLinks);
                    }
                }).catch(err => console.error('שגיאה בטעינת הגדרות:', err));
            }, []);

            useEffect(() => {
                // שמירת הגדרות ב-Firestore
                db.collection('settings').doc('general').set({
                    announcements,
                    adminPassword,
                    footerLinks
                }, { merge: true }).catch(err => console.error('שגיאה בשמירה:', err));
            }, [announcements, adminPassword, footerLinks]);

            const updateUser = (updates) => {
                const updated = users.map(u => 
                    u.id === currentUser.id ? { ...u, ...updates } : u
                );
                setUsers(updated);
                setCurrentUser({ ...currentUser, ...updates });
            };

            const handleLogoDoubleClick = () => {
                const now = Date.now();
                if (logoClickTime && now - logoClickTime < 500) {
                    const password = prompt('🔐 הזן סיסמת מנהל:');
                    if (password === adminPassword) {
                        setIsAdmin(true);
                        setView('admin');
                        alert('✅ התחברת כמנהל');
                    } else if (password) {
                        alert('❌ סיסמה שגויה');
                    }
                    setLogoClickTime(null);
                } else {
                    setLogoClickTime(now);
                }
            };

            if (isAdmin && view === 'admin') {
                return <AdminPanel users={users} announcements={announcements} setAnnouncements={setAnnouncements} adminPassword={adminPassword} setAdminPassword={setAdminPassword} footerLinks={footerLinks} setFooterLinks={setFooterLinks} setIsAdmin={setIsAdmin} setView={setView} />;
            }

            if (!currentUser) {
                return <LoginPage users={users} setUsers={setUsers} setCurrentUser={setCurrentUser} onLogoDoubleClick={handleLogoDoubleClick} announcements={announcements} />;
            }

            return <MainApp user={currentUser} updateUser={updateUser} view={view} setView={setView} onLogout={() => { setCurrentUser(null); setView('login'); }} onLogoDoubleClick={handleLogoDoubleClick} announcements={announcements} footerLinks={footerLinks} />;

            const [isRegister, setIsRegister] = useState(false);
            const [form, setForm] = useState({ name: '', year: '2', gender: 'female', email: '', password: '' });

            const handleSubmit = async (e) => {
                e.preventDefault();
                try {
                    if (isRegister) {
                        // הרשמה עם Firebase Auth
                        const userCredential = await auth.createUserWithEmailAndPassword(form.email, form.password);
                        const newUser = {
                            id: userCredential.user.uid,
                            name: form.name,
                            year: form.year,
                            gender: form.gender,
                            email: form.email,
                            practicalHours: [],
                            supervisionHours: [],
                            casePresentation: null,
                            caseSummary: null,
                            consultations: [],
                            attendance: 0,
                            tasks: []
                        };
                        // שמירה ב-Firestore
                        await db.collection('users').doc(newUser.id).set(newUser);
                        setUsers([...users, newUser]);
                        setCurrentUser(newUser);
                        alert('✅ נרשמת בהצלחה!');
                    } else {
                        // התחברות עם Firebase Auth
                        const userCredential = await auth.signInWithEmailAndPassword(form.email, form.password);
                        const userId = userCredential.user.uid;
                        // טעינת נתוני המשתמש מ-Firestore
                        const doc = await db.collection('users').doc(userId).get();
                        if (doc.exists) {
                            setCurrentUser({ id: doc.id, ...doc.data() });
                        } else {
                            alert('❌ לא נמצא משתמש');
                        }
                    }
                } catch (error) {
                    console.error('שגיאה:', error);
                    if (error.code === 'auth/email-already-in-use') {
                        alert('❌ המייל כבר קיים במערכת');
                    } else if (error.code === 'auth/wrong-password') {
                        alert('❌ סיסמה שגויה');

                    </div>

                                    <div>

                    <div className="max-w-7xl mx-auto px-6 py-6">

        function StatsCard({ title, current, total, color, onClick }) {
            const colors = {
                blue: { bg: 'bg-blue-500', light: 'bg-blue-100' },
                green: { bg: 'bg-green-500', light: 'bg-green-100' },
                purple: { bg: 'bg-purple-500', light: 'bg-purple-100' },
                orange: { bg: 'bg-orange-500', light: 'bg-orange-100' }

                <div onClick={onClick} className="card p-6 cursor-pointer hover:shadow-lg transition">

                    </div>
                    <div className="w-full bg-gray-200 rounded-full h-2">

                    <p className="text-xs text-gray-500 mt-2">{Math.round(progress)}% הושלם</p>
                </div>
            );

        function TaskAlert({ type, onClick, children }) {

        // ============= PRACTICAL HOURS - FULL =============
        function PracticalHours({ user, updateUser }) {
            const [showForm, setShowForm] = useState(false);
            const [editIndex, setEditIndex] = useState(null);
            const [expandedIndex, setExpandedIndex] = useState(null);
            const [form, setForm] = useState({
                date: '', sessionNumber: '', startEnd: '', topics: '', 
                clientPosition: '', focusPoints: '', insights: '', 
                mainChallenge: '', lessons: ''
            });

            const resetForm = () => {
                setForm({ date: '', sessionNumber: '', startEnd: '', topics: '', clientPosition: '', focusPoints: '', insights: '', mainChallenge: '', lessons: '' });
                setShowForm(false);
                setEditIndex(null);
            };

            const handleSave = (e) => {
                e.preventDefault();
                const hours = [...(user.practicalHours || [])];
                
                if (editIndex !== null) {
                    hours[editIndex] = { ...form, id: hours[editIndex].id };
                } else {
                    hours.push({ ...form, id: Date.now().toString() });
                }
                
                updateUser({ practicalHours: hours });
                resetForm();
                alert('✅ הדיווח נשמר בהצלחה!');
            };

            const handleEdit = (index) => {
                setForm(user.practicalHours[index]);

                                {(user.attendance || 0) >= 80 
                                    ? '✅ מצוין! עמדת ביעד הנוכחות' 
                                    : `⚠️ נדרש עוד ${80 - (user.attendance || 0)}% כדי להגיע ליעד`}
                            </p>
                        </div>
                    </div>
                </div>
            );
        }
        
        function Contacts({ user }) {
            return (
                <div className="space-y-6">
                    <div className="card p-6">
                        <h2 className="text-2xl font-bold mb-2">📞 אנשי קשר ומדריכים</h2>
                        <p className="text-gray-600">צוות ההדרכה שלך</p>
                    </div>
                    <div className="grid md:grid-cols-2 gap-6">
                        {INSTRUCTORS[user.gender].map((inst, i) => (
                            <div key={i} className="card p-6 hover:shadow-lg transition">
                                <h3 className="font-bold text-lg mb-2">{inst.name}</h3>
                                <a href={`tel:${inst.phone}`} className="text-purple-600 font-semibold hover:text-purple-700 text-lg">
                                    📱 {inst.phone}
                                </a>
                            </div>
                        ))}
                    </div>

                    <div className="card p-6 bg-blue-50 border-2 border-blue-200">
                        <h3 className="font-bold text-blue-900 mb-3">💡 הערות חשובות</h3>
                        <ul className="space-y-2 text-blue-800">
                            <li>• 3 שעות הדרכה חייבות להיות על בסיס הצגת המקרה</li>
                            <li>• 3 שעות הדרכה חייבות להיות מול אורלי</li>
                            <li>• ההדרכות במחיר מסובסד (לא כלול בשכר לימוד)</li>
                            <li>• תשלום מתבצע ישירות מול המדריכות</li>
                        </ul>
                    </div>
                </div>
            );
        }

        
        // ============= Footer Component =============
        function Footer({ links = [] }) {
            return (
                <footer className="bg-gray-800 text-white py-8 mt-20">
                    <div className="max-w-7xl mx-auto px-6">
                        <div className="grid md:grid-cols-3 gap-8 mb-6">
                            <div>
                                <div className="flex items-center gap-3 mb-3">
                                    <img src={`data:image/png;base64,${LOGO_BASE64}`} alt="לוגו" style={{height: '50px', width: 'auto'}} />
                                    <h3 className="font-bold text-xl">מכללת תורת הנפש</h3>
                                </div>
                                <p className="text-gray-300 text-sm">בדרך הבעל שם טוב</p>
                            </div>
                            <div>
                                <h4 className="font-bold mb-3">יצירת קשר</h4>
                                <p className="text-gray-300 text-sm">📞 02-5662323</p>
                                <p className="text-gray-300 text-sm">✉️ info@torathanefesh.org</p>
                            </div>
                            <div>
                                <h4 className="font-bold mb-3">קישורים</h4>
                                {links && links.length > 0 ? (
                                    links.map(link => (
                                        <a key={link.id} href={link.url} target="_blank" rel="noopener noreferrer" className="block text-gray-300 text-sm hover:text-white hover:underline mb-1">
                                            🔗 {link.title}
                                        </a>
                                    ))
                                ) : (
                                    <p className="text-gray-400 text-sm">אין קישורים (ניתן להוסיף בניהול)</p>
                                )}
                            </div>
                        </div>
                        <div className="border-t border-gray-700 pt-6 text-center">
                            <div className="flex items-center justify-center gap-3">
                                <img src={`data:image/png;base64,${LOGO_BASE64}`} alt="לוגו" style={{height: '40px', width: 'auto', opacity: 0.8}} />
                                <p className="text-gray-400 text-sm">
                                    © {new Date().getFullYear()} מכללת תורת הנפש - כל הזכויות שמורות
                                </p>
                            </div>
                            <p className="text-gray-500 text-xs mt-2">
                                פותח בטכנולוגיית React | יומן תלמידות דיגיטלי
                            </p>
                        </div>
                    </div>
                </footer>
            );
        }

        // ============= Admin Panel =============
        function AdminPanel({ users, announcements, setAnnouncements, adminPassword, setAdminPassword, footerLinks, setFooterLinks, setIsAdmin, setView }) {
            const [adminView, setAdminView] = useState('dashboard');

            return (
                <div className="min-h-screen bg-gray-50">
                    <header className="bg-gradient-to-r from-purple-600 to-indigo-600 text-white p-6 shadow-lg">
                        <div className="max-w-7xl mx-auto">
                            <div className="flex justify-between items-center">
                                <div>
                                    <h1 className="text-3xl font-bold">🔐 פאנל ניהול</h1>
                                    <p className="text-purple-100 mt-1">מכללת תורת הנפש</p>
                                </div>
                                <button onClick={() => { setIsAdmin(false); setView('login'); }}
                                    className="px-6 py-3 bg-white text-purple-600 rounded-xl font-bold hover:bg-gray-100 transition">
                                    יציאה
                                </button>
                            </div>
                        </div>
                    </header>

                    <div className="max-w-7xl mx-auto p-6">
                        <nav className="flex gap-2 mb-6 overflow-x-auto">
                            <button onClick={() => setAdminView('dashboard')} className={`px-6 py-3 rounded-xl font-bold whitespace-nowrap ${adminView === 'dashboard' ? 'bg-white shadow' : 'bg-purple-100'}`}>📊 תלמידים</button>
                            <button onClick={() => setAdminView('links')} className={`px-6 py-3 rounded-xl font-bold whitespace-nowrap ${adminView === 'links' ? 'bg-white shadow' : 'bg-purple-100'}`}>🔗 קישורים</button>
                            <button onClick={() => setAdminView('settings')} className={`px-6 py-3 rounded-xl font-bold whitespace-nowrap ${adminView === 'settings' ? 'bg-white shadow' : 'bg-purple-100'}`}>⚙️ הגדרות</button>
                        </nav>

                        {adminView === 'dashboard' && (
                            <div className="card p-6">
                                <h2 className="text-2xl font-bold mb-4">👥 תלמידים ({users.length})</h2>
                                {users.length === 0 ? <p className="text-center text-gray-500 p-12">אין תלמידים</p> : (
                                    <div className="overflow-x-auto">
                                        <table className="w-full">
                                            <thead className="bg-gray-50">
                                                <tr>
                                                    <th className="px-6 py-3 text-right font-bold">שם</th>
                                                    <th className="px-6 py-3 text-right font-bold">שנה</th>
                                                    <th className="px-6 py-3 text-right font-bold">מגדר</th>
                                                    <th className="px-6 py-3 text-right font-bold">אימייל</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {users.map((u, i) => (
                                                    <tr key={u.id} className={i % 2 === 0 ? 'bg-white' : 'bg-gray-50'}>
                                                        <td className="px-6 py-3 font-semibold">{u.name}</td>
                                                        <td className="px-6 py-3">שנה {u.year}</td>
                                                        <td className="px-6 py-3">{u.gender === 'female' ? '👩' : '👨'}</td>
                                                        <td className="px-6 py-3 text-sm">{u.email}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                )}
                            </div>
                        )}

                        {adminView === 'links' && (
                            <div className="card p-8">
                                <h2 className="text-2xl font-bold mb-6">🔗 ניהול קישורים</h2>
                                <div className="bg-blue-50 p-6 rounded-lg mb-6">
                                    <h3 className="font-bold text-blue-900 mb-4">➕ הוסף קישור</h3>
                                    <div className="space-y-3">
                                        <input id="linkTitle" type="text" placeholder="שם הקישור" className="w-full px-4 py-3 border-2 rounded-lg" />
                                        <input id="linkUrl" type="url" placeholder="https://..." className="w-full px-4 py-3 border-2 rounded-lg" />
                                        <button onClick={() => {
                                            const title = document.getElementById('linkTitle').value;
                                            const url = document.getElementById('linkUrl').value;
                                            if (title && url) {
                                                setFooterLinks([...footerLinks, { id: Date.now(), title, url }]);
                                                document.getElementById('linkTitle').value = '';
                                                document.getElementById('linkUrl').value = '';
                                                alert('✅ קישור נוסף!');
                                            } else {
                                                alert('❌ מלא את כל השדות');
                                            }
                                        }} className="w-full px-6 py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700">
                                            ➕ הוסף
                                        </button>
                                    </div>
                                </div>
                                <div className="bg-gray-50 p-6 rounded-lg">
                                    <h3 className="font-bold mb-4">קישורים ({footerLinks.length})</h3>
                                    {footerLinks.length === 0 ? <p className="text-gray-500 text-center p-8">אין קישורים</p> : (
                                        <div className="space-y-3">
                                            {footerLinks.map(link => (
                                                <div key={link.id} className="bg-white p-4 rounded-lg flex justify-between items-center">
                                                    <div>
                                                        <p className="font-bold">{link.title}</p>
                                                        <a href={link.url} target="_blank" className="text-sm text-blue-600">{link.url}</a>
                                                    </div>
                                                    <button onClick={() => {
                                                        if (confirm('למחוק?')) setFooterLinks(footerLinks.filter(l => l.id !== link.id));
                                                    }} className="px-4 py-2 bg-red-500 text-white rounded-lg font-bold">🗑️</button>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {adminView === 'settings' && (
                            <div className="card p-8">
                                <h2 className="text-2xl font-bold mb-6">⚙️ הגדרות</h2>
                                <div className="bg-purple-50 p-6 rounded-lg mb-6 border-2 border-purple-200">
                                    <h3 className="font-bold text-purple-900 mb-4">🔐 שינוי סיסמה</h3>
                                    <div className="space-y-4">
                                        <input type="text" value={adminPassword} readOnly className="w-full px-4 py-3 bg-white border-2 rounded-lg font-mono" />
                                        <button onClick={() => {
                                            const newPass = prompt('סיסמה חדשה (6+ תווים):', adminPassword);
                                            if (newPass && newPass.length >= 6) {
                                                setAdminPassword(newPass);
                                                alert('✅ הסיסמה שונתה!');
                                            } else if (newPass) {
                                                alert('❌ לפחות 6 תווים');
                                            }
                                        }} className="px-8 py-3 bg-purple-600 text-white rounded-xl font-bold hover:bg-purple-700">
                                            🔑 שנה סיסמה
                                        </button>
                                    </div>
                                </div>
                                <div className="bg-green-50 p-6 rounded-lg">
                                    <h3 className="font-bold text-green-900 mb-3">💾 גיבוי</h3>
                                    <button onClick={() => {
                                        const data = { users, announcements, adminPassword, footerLinks };
                                        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                                        const url = URL.createObjectURL(blob);
                                        const a = document.createElement('a');
                                        a.href = url;
                                        a.download = `backup-${new Date().toISOString().split('T')[0]}.json`;
                                        a.click();
                                        URL.revokeObjectURL(url);
                                    }} className="px-6 py-3 bg-green-600 text-white rounded-xl font-bold hover:bg-green-700">
                                        📥 הורד גיבוי
                                    </button>
                                </div>
                            </div>
                        )}
                    </div>
                    <Footer links={footerLinks} />
                </div>
            );
        }


        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
