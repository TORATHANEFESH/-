<style>
*{box-sizing:border-box;}
body{font-family:'Assistant',sans-serif;}
h1,h2,h3,h4,h5,h6{font-family:'Heebo',sans-serif;}
input,textarea,select,button{font-family:'Assistant',sans-serif;}
body{margin:0;min-height:100vh;}

/* ── THEMES ── */
body.theme-default{
  --bg:#f7f5fb;--card:#fff;--hdr:#fff;--a1:#4a6fa5;--a2:#7b4fa6;
  --txt:#1e2a3a;--sub:#64748b;--nf:#4a6fa5;--nt:#7b4fa6;
  --trk:#e8e0f0;--brd:rgba(0,0,0,.07);--hf:#4a6fa5;--ht:#7b4fa6;
}
body.theme-logo{
  --bg:#f0eef8;--card:#fff;--hdr:#fff;--a1:#3d5a8a;--a2:#8b4a8a;
  --txt:#2c3e6b;--sub:#6b6b9a;--nf:#3d5a8a;--nt:#8b4a8a;
  --trk:#ddd8f0;--brd:rgba(61,90,138,.1);--hf:#3d5a8a;--ht:#8b4a8a;
}
body.theme-screenshot{
  --bg:#f4f6fa;--card:#fff;--hdr:#fff;--a1:#5b6abf;--a2:#9b59b6;
  --txt:#2d3748;--sub:#718096;--nf:#5b6abf;--nt:#9b59b6;
  --trk:#e2e8f0;--brd:rgba(0,0,0,.07);--hf:#5b6abf;--ht:#9b59b6;
}
body.theme-animated{
  --bg:#0f0c29;--card:rgba(255,255,255,.07);--hdr:rgba(15,12,41,.96);
  --a1:#a855f7;--a2:#06b6d4;--txt:#eeeeff;--sub:#a0a0c0;
  --nf:#a855f7;--nt:#06b6d4;--trk:rgba(255,255,255,.1);
  --brd:rgba(255,255,255,.12);--hf:#6d28d9;--ht:#0891b2;
}
body.theme-animated::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse at 20% 50%,rgba(168,85,247,.2) 0%,transparent 50%),
             radial-gradient(ellipse at 80% 20%,rgba(6,182,212,.2) 0%,transparent 50%),
             radial-gradient(ellipse at 50% 80%,rgba(99,102,241,.12) 0%,transparent 50%);
  animation:bgPulse 6s ease-in-out infinite alternate;
}
@keyframes bgPulse{0%{opacity:.6}100%{opacity:1.2}}
body.theme-animated .logo-img{mix-blend-mode:lighten;filter:brightness(1.4) drop-shadow(0 0 8px rgba(168,85,247,.4));}

/* ── APP ── */
html{width:100%;min-width:320px;}
body{width:100%;min-width:320px;margin:0;padding:0;}
#root{width:100%;min-width:320px;}
.app-bg{background:var(--bg);min-height:100vh;position:relative;z-index:1;width:100%;}
.app-hdr{
  background:var(--hdr);
  border-bottom:1px solid var(--brd);
  box-shadow:0 2px 16px rgba(0,0,0,.06);
  position:sticky;top:0;z-index:50;
  backdrop-filter:blur(12px);
}
.card{
  background:var(--card);border-radius:16px;
  box-shadow:0 2px 12px rgba(0,0,0,.06);
  border:1px solid var(--brd);transition:all .25s;
}
body.theme-animated .card{backdrop-filter:blur(10px);}
.card:hover{box-shadow:0 6px 24px rgba(0,0,0,.1);transform:translateY(-1px);}

.btn-p{
  background:linear-gradient(135deg,var(--a1),var(--a2));
  color:#fff;border:none;cursor:pointer;transition:all .2s;
}
.btn-p:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 5px 16px rgba(74,111,165,.4);}

.nav-tab{
  padding:9px 18px;border-radius:11px;font-weight:600;
  font-size:.85rem;white-space:nowrap;cursor:pointer;
  transition:all .2s;border:1px solid transparent;
}

.stat-card{
  background:var(--card);border-radius:14px;padding:18px;
  cursor:pointer;transition:all .25s;
  border:1px solid var(--brd);position:relative;overflow:hidden;
}
.stat-card:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(0,0,0,.1);}
body.theme-animated .stat-card:hover{box-shadow:0 10px 28px rgba(168,85,247,.2);}

.fl-label{display:block;font-size:.8rem;font-weight:700;color:var(--txt);margin-bottom:5px;}
.fl-label.req::after{content:' *';color:#ef4444;}
input,textarea,select{
  width:100%;
  padding:11px 14px;border:2px solid var(--brd);
  border-radius:11px;background:var(--card);color:var(--txt);
  font-size:.9rem;transition:border-color .2s;
}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--a1);box-shadow:0 0 0 3px rgba(74,111,165,.12);}

/* Login animations */
@keyframes floatA{0%{transform:translateY(0)translateX(0)}33%{transform:translateY(-60px)translateX(-30px)}66%{transform:translateY(-20px)translateX(40px)}100%{transform:translateY(0)translateX(0)}}
@keyframes floatB{0%{transform:translateY(0)translateX(0)}33%{transform:translateY(40px)translateX(30px)}66%{transform:translateY(-30px)translateX(-20px)}100%{transform:translateY(0)translateX(0)}}
@keyframes floatC{0%{transform:translateY(0)scale(1)}50%{transform:translateY(-30px)scale(1.05)}100%{transform:translateY(0)scale(1)}}
@keyframes sparkle{0%,100%{opacity:0;transform:scale(0)}50%{opacity:1;transform:scale(1)}}
@keyframes drift{0%{transform:translate(0,0)rotate(0deg)}25%{transform:translate(15px,-20px)rotate(5deg)}50%{transform:translate(-10px,-35px)rotate(-3deg)}75%{transform:translate(-20px,-15px)rotate(4deg)}100%{transform:translate(0,0)rotate(0deg)}}

::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-thumb{background:rgba(74,111,165,.35);border-radius:999px;}
  ::-webkit-scrollbar-thumb{background:rgba(74,111,165,.35);border-radius:999px;}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .app-hdr .hdr-inner{padding:8px 16px!important;}
  .logo-img{height:70px!important;}
  .main-content{padding:14px 16px!important;}
  .stat-grid{grid-template-columns:1fr 1fr!important;}
  .req-grid{grid-template-columns:1fr 1fr!important;}
  .footer-grid{grid-template-columns:1fr!important;}
}
@media(max-width:480px){
  .stat-grid{grid-template-columns:1fr!important;}
}
</style>

async function upFile(file,uid,cat){
  const ref=storage.ref(`uploads/${uid}/${cat}/${Date.now()}_${file.name}`);
  await ref.put(file);
  const url=await ref.getDownloadURL();
  const result={url,name:file.name,at:new Date().toISOString(),uid,cat};
  // Save upload notification for teacher view
  try{
    await db.collection('uploads').add({
      studentId:uid, category:cat, fileName:file.name,
      url, uploadedAt:new Date().toISOString(), seen:false
    });
  }catch(e){console.warn('notification save failed:',e);}
  return result;
}

function rgbToHex(rgb){
  if(!rgb||rgb.startsWith('#')) return rgb||'#333333';
  const m=rgb.match(/\d+/g);
  if(!m||m.length<3) return '#333333';
  return '#'+m.slice(0,3).map(x=>parseInt(x).toString(16).padStart(2,'0')).join('');
}
// ══════════ APP ROOT ══════════
function App(){
  const [users,setUsers]=useState([]);
  const [cur,setCur]=useState(()=>{
    try{const s=localStorage.getItem('cur_user');return s?JSON.parse(s):null;}
    catch(e){return null;}
  });
  const [view,setView]=useState('dashboard');
  const [adminPw,setAdminPw]=useState('1234');
  const [teacherPw,setTeacherPw]=useState('1234');
  const [isAdmin,setIsAdmin]=useState(false);
  const [isTeacher,setIsTeacher]=useState(false);
  const [siteC,setSiteC]=useState({});
  const [reqOv,setReqOv]=useState({});
  const [theme,setTheme]=useState('default');
  const [logoClicks,setLogoClicks]=useState([]);

  useEffect(()=>{
    const loadAll=()=>{
      db.collection('settings').doc('general').get().then(d=>{
        if(d.exists){
          const v=d.data();
          if(v.adminPassword) setAdminPw(v.adminPassword);
          if(v.teacherPassword) setTeacherPw(v.teacherPassword);
          if(v.theme){setTheme(v.theme);document.body.className='theme-'+v.theme;}
        }
      }).catch(console.error);
      db.collection('settings').doc('siteContent').get().then(d=>{
        if(d.exists){
          const raw=d.data().content||{};
          // Strip legacy elStyles (caused Firestore errors) — keep only plain fields
          const {elStyles:_dropped,...cont}=raw;
          // Promote veFields text values into top-level content so React renders them
          const promoted={...cont};
          if(cont.veFields){
            Object.entries(cont.veFields).forEach(([k,f])=>{
              if(typeof f.text==='string'&&f.text) promoted[k]=f.text;
            });
          }
          setSiteC(promoted); setReqOv(d.data().reqOv||{});
          if(promoted.bodyFont) document.body.style.fontFamily=`'${promoted.bodyFont}',sans-serif`;
          if(promoted.headingFont){
            const applyHF=()=>document.querySelectorAll('h1,h2,h3,h4').forEach(el=>el.style.fontFamily=`'${promoted.headingFont}',sans-serif`);
            applyHF(); setTimeout(applyHF,500);
          }
        }
      }).catch(console.error);
      db.collection('users').get().then(s=>{
        const a=[];s.forEach(d=>a.push({id:d.id,...d.data()}));setUsers(a);
      }).catch(console.error);
    };
    // Load directly — Firestore rules set to allow all
    loadAll();
  },[]);

  useEffect(()=>{document.body.className='theme-'+theme;},[theme]);
  useEffect(()=>{
    try{
      if(cur) localStorage.setItem('cur_user',JSON.stringify(cur));
      else localStorage.removeItem('cur_user');
    }catch(e){}
  },[cur]);
  useEffect(()=>{
    if(users.length>0) users.forEach(u=>db.collection('users').doc(u.id).set(u).catch(console.error));
  },[users]);

  const updateUser=upd=>{
    const a=users.map(u=>u.id===cur.id?{...u,...upd}:u);
    setUsers(a);setCur({...cur,...upd});
  };
  const sanitizeForFirestore=obj=>JSON.parse(JSON.stringify(obj,(key,val)=>{
    if(val===null||val===undefined) return val;
    if(typeof val==='function') return undefined;
    if(typeof val==='object'&&typeof val.nodeType==='number') return undefined;
    if(typeof val==='object'&&val.constructor&&val.constructor.name!=='Object'&&val.constructor.name!=='Array') return undefined;
    return val;
  }));
  const saveSite=(c,r)=>{
    const safeC=sanitizeForFirestore(c);
    const safeR=sanitizeForFirestore(r);
    return db.collection('settings').doc('siteContent').set({content:safeC,reqOv:safeR},{merge:true})
      .then(()=>{setSiteC(safeC);setReqOv(safeR);});
  };
  const saveTheme=t=>{setTheme(t);db.collection('settings').doc('general').set({theme:t},{merge:true}).catch(console.error);};

  // LOGO double-click → choose role
  const handleLogo=()=>{
    const now=Date.now();
    const recent=logoClicks.filter(t=>now-t<1200);
    if(recent.length>=2){
      setLogoClicks([]);
      // Show role chooser
      const choice=prompt('בחר תפקיד:\n1 — מנהל\n2 — מחנך\n\nהזן מספר:');
      if(choice==='1'){
        const pw=prompt('סיסמת מנהל:');
        if(pw===adminPw){setIsAdmin(true);setView('admin');}
        else if(pw) alert('סיסמה שגויה');
      } else if(choice==='2'){
        const pw=prompt('סיסמת מחנך:');
        if(pw===teacherPw){setIsTeacher(true);setView('teacher');}
        else if(pw) alert('סיסמה שגויה');
      }
    } else {
      setLogoClicks([...recent,now]);
    }
  };

  if(isAdmin&&view==='admin')
    return <AdminPanel users={users} setUsers={setUsers}
      adminPw={adminPw} setAdminPw={setAdminPw}
      teacherPw={teacherPw} setTeacherPw={setTeacherPw}
      siteC={siteC} reqOv={reqOv} saveSite={saveSite}
      setIsAdmin={setIsAdmin} setView={setView}
      theme={theme} saveTheme={saveTheme}/>;

  if(isTeacher&&view==='teacher')
    return <TeacherPanel users={users} setIsTeacher={setIsTeacher} setView={setView}/>;

  if(!cur)
    return <LoginPage users={users} setUsers={setUsers} setCur={setCur} onLogo={handleLogo}/>;

  return <MainApp user={cur} updateUser={updateUser} view={view} setView={setView}
    onLogout={()=>{setCur(null);setView('login');setIsAdmin(false);setIsTeacher(false);try{localStorage.removeItem('cur_user');}catch(e){};}}
    onLogo={handleLogo} reqOv={reqOv} siteC={siteC}/>;
}

function LoginPage({users,setUsers,setCur,onLogo}){
  const [reg,setReg]=useState(false);

  const [loading,setLoading]=useState(false);

  const submit=async e=>{
    e.preventDefault();setLoading(true);
    try{
      if(reg){
        const cred=await auth.createUserWithEmailAndPassword(form.email,form.pw);
        const nu={id:cred.user.uid,name:form.name,year:form.year,gender:form.gender,email:form.email,
          practical:[],supervision:[],cases:[],impact:[],proficiency:[],finalProject:null,yearHistory:[]};
        await db.collection('users').doc(nu.id).set(nu);setUsers([...users,nu]);setCur(nu);
      }else{
        const cred=await auth.signInWithEmailAndPassword(form.email,form.pw);
        const doc=await db.collection('users').doc(cred.user.uid).get();
        if(doc.exists) setCur({practical:[],supervision:[],cases:[],impact:[],proficiency:[],finalProject:null,yearHistory:[],...doc.data(),id:doc.id});

    {w:340,h:340,bottom:'8%',right:'18%',bg:'rgba(99,102,241,0.12)',dur:'13s',del:'10.4s'},

    <div className="card" style={{padding:'20px',marginBottom:'16px'}}>

        </div>
        <span style={{fontWeight:700,fontSize:'.87rem',color:'var(--txt)'}}>{done}/{total}</span>

  return(<div>

function AdminPanel({users,setUsers,adminPw,setAdminPw,teacherPw,setTeacherPw,siteC,reqOv,saveSite,setIsAdmin,setView,theme,saveTheme}){
  const [tab,setTab]=useState('students');
  const [gf,setGf]=useState('');
  const [yf,setYf]=useState('');
  // Reload users from Firestore if not loaded yet
  useEffect(()=>{
    db.collection('users').get().then(s=>{
      const a=[];s.forEach(d=>a.push({id:d.id,...d.data()}));
      if(a.length>0) setUsers(a);
    }).catch(console.error);
  },[]);
  const [editC,setEditC]=useState({...siteC});
  const [editR,setEditR]=useState({...reqOv});
  // Keep editC in sync when siteC updates from Firebase
  useEffect(()=>{setEditC(prev=>({...siteC,...prev}));},[siteC]);
  const [editTh,setEditTh]=useState(theme);
  const [editAdminPw,setEditAdminPw]=useState(adminPw);
  const [editTeacherPw,setEditTeacherPw]=useState(teacherPw);
  const [saving,setSaving]=useState(false);
  const [saved,setSaved]=useState(false);
  const [dirty,setDirty]=useState(false);
  const [veOpen,setVeOpen]=useState(false);

  const mark=()=>setDirty(true);
  const chC=v=>{setEditC(v);mark();};
  const chR=v=>{setEditR(v);mark();};
  const chTh=v=>{setEditTh(v);mark();};

  const getR=(g,y,f)=>((editR[g]||{})[y]||{})[f]??((DEF_REQ[g]||{})[parseInt(y)]||{})[f]??'';
  const setR=(g,y,f,v)=>{const u=JSON.parse(JSON.stringify(editR));if(!u[g])u[g]={};if(!u[g][y])u[g][y]={};u[g][y][f]=parseInt(v)||0;chR(u);};

  const saveAll=async(explicitC)=>{
    setSaving(true);
    try{
      const contentToSave=explicitC||editC;
      if(explicitC) setEditC(explicitC);
      await saveSite(contentToSave,editR);
      // Always save theme (even when called from VE)
      saveTheme(editTh);
      const genData={theme:editTh};
      if(editAdminPw!==adminPw){genData.adminPassword=editAdminPw;setAdminPw(editAdminPw);}
      if(editTeacherPw!==teacherPw){genData.teacherPassword=editTeacherPw;setTeacherPw(editTeacherPw);}
      await db.collection('settings').doc('general').set(genData,{merge:true});
      setSaved(true);setDirty(false);setTimeout(()=>setSaved(false),3000);
    }catch(e){alert('שגיאה בשמירה: '+e.message);}
    setSaving(false);
  };

  const upYear=(uid,yr)=>{
    const u=users.find(x=>x.id===uid);if(!u)return;
    const snap={year:u.year,at:new Date().toISOString(),practical:(u.practical||[]).length,supervision:(u.supervision||[]).length,cases:(u.cases||[]).length,impact:(u.impact||[]).length};
    const hist=[...(u.yearHistory||[])];if(!hist.find(h=>h.year===u.year))hist.push(snap);
    const upd=users.map(x=>x.id===uid?{...x,year:yr,yearHistory:hist}:x);setUsers(upd);
    db.collection('users').doc(uid).update({year:yr,yearHistory:hist}).catch(console.error);
    alert(`שנה עודכנה ל-${YL[yr]||yr}`);
  };

              <h2 style={{margin:'0 0 13px',fontSize:'.97rem',fontWeight:700}}>סיסמאות כניסה</h2>

                  <p style={{margin:'4px 0 0',fontSize:'.73rem',color:'#94a3b8'}}>גישה לצפייה בפרטי תלמידים בלבד</p>
                </div>
              </div>
            </div>
            <div style={{background:'white',borderRadius:'13px',padding:'20px'}}>
              <h2 style={{margin:'0 0 10px',fontSize:'.97rem',fontWeight:700}}>גיבוי נתונים</h2>
              <button onClick={()=>{const b=new Blob([JSON.stringify({users,adminPw,teacherPw},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`backup-${new Date().toISOString().split('T')[0]}.json`;a.click();}}
                style={{padding:'10px 20px',borderRadius:'9px',background:'#059669',color:'white',fontWeight:700,border:'none',cursor:'pointer'}}>הורד גיבוי JSON</button>
            </div>
            <div style={{background:'white',borderRadius:'13px',padding:'20px'}}>
              <h2 style={{margin:'0 0 6px',fontSize:'.97rem',fontWeight:700}}>תיקון חד-פעמי</h2>
              <p style={{margin:'0 0 12px',fontSize:'.8rem',color:'#6b7280'}}>אם העורך הויזואלי לא שמר — לחץ כאן לניקוי נתוני עורך ישנים מ-Firebase</p>
              <button onClick={async()=>{
                try{
                  await db.collection('settings').doc('siteContent').set({},{merge:true});

                  if(d.exists){
                    const raw=d.data().content||{};
                    const {elStyles:_d,...clean}=raw;
                    await db.collection('settings').doc('siteContent').set({content:clean,reqOv:d.data().reqOv||{}});
                  }
                  alert('בוצע! כעת שמור מהעורך הויזואלי מחדש.');
                }catch(e){alert('שגיאה: '+e.message);}
              }} style={{padding:'10px 20px',borderRadius:'9px',background:'#dc2626',color:'white',fontWeight:700,border:'none',cursor:'pointer'}}>
                נקה elStyles ישנים מ-Firebase
              </button>
            </div>
          </div>
        )}
      </div>
    </div>

// ══════════ FONT HOVER PICKER ══════════
const FONTS_LIST=['Assistant','Heebo','Rubik','Varela Round','Frank Ruhl Libre','Secular One','Bellefair','Amatic SC','Suez One','Noto Sans Hebrew','Noto Serif Hebrew','Tinos','Arimo','Cousine'];

function FontHoverPicker({selEl,dark=true,onApply}){ 
  const [open,setOpen]=useState(false);
  const [hovered,setHovered]=useState(null);
  const origFont=useRef(null);
  const listRef=useRef(null);

  // Save original font when list opens
  const openList=()=>{
    if(selEl) origFont.current=selEl.style.fontFamily||'';
    setOpen(true);
  };

  // Hover a font row — apply directly to element
  const onRowEnter=f=>{
    setHovered(f);
    if(selEl) selEl.style.fontFamily=`'${f}',sans-serif`;
  };

  // Mouse left the whole list — revert
  const onListLeave=()=>{
    if(selEl&&origFont.current!=null) selEl.style.fontFamily=origFont.current;
    setHovered(null);
    setOpen(false);
  };

  // Clicked a font — commit
  const applyFont=f=>{
    origFont.current=`'${f}',sans-serif`;
    if(selEl) selEl.style.fontFamily=`'${f}',sans-serif`;
    if(onApply) onApply(f, selEl);
    setHovered(null);
    setOpen(false);
  };

  return(
    <div style={{position:'relative',display:'inline-block'}}>
      <button onClick={openList} style={{padding:'4px 10px',borderRadius:'7px',background:dark?'rgba(255,255,255,.12)':'#f3f4f6',border:'1px solid '+(dark?'rgba(255,255,255,.2)':'#e5e7eb'),color:dark?'white':'#374151',fontSize:'.8rem',cursor:'pointer',fontWeight:600,whiteSpace:'nowrap',width:dark?'auto':'100%',textAlign:'right'}}>
        {hovered||'פונט ▾'}
      </button>
      {open&&(
        <div ref={listRef}
          onMouseLeave={onListLeave}
          style={{position:'absolute',top:'calc(100% + 4px)',right:0,
            background:dark?'#1e1b4b':'white',border:'1px solid '+(dark?'rgba(255,255,255,.15)':'#e5e7eb'),
            borderRadius:'10px',overflow:'hidden auto',zIndex:10000,
            boxShadow:'0 8px 32px rgba(0,0,0,.6)',width:'190px',maxHeight:'300px'}}>
          {FONTS_LIST.map(f=>(
            <div key={f}
              onMouseEnter={()=>onRowEnter(f)}
              onClick={()=>applyFont(f)}
              style={{padding:'9px 14px',cursor:'pointer',color:dark?'white':'#374151',fontFamily:`'${f}',sans-serif`,fontSize:'1rem',lineHeight:'1.3',background:hovered===f?(dark?'rgba(74,111,165,.6)':'rgba(74,111,165,.1)'):'transparent',borderBottom:'1px solid '+(dark?'rgba(255,255,255,.05)':'#f3f4f6'),userSelect:'none'}}>
              {f}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

        <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',zIndex:2}}>

}

// ══════════ VISUAL EDITOR ══════════
function VisualEditor({onClose,editC,setEditC,editR,setR,getR,editTh,setEditTh,onSave,saving,saved,users,reqOv}){
  const [browseMode,setBrowseMode]=useState(true);
  const [dragMode,setDragMode]=useState(false);
  const [previewView,setPreviewView]=useState('dashboard');
  const [previewGender,setPreviewGender]=useState('female');
  const [previewYear,setPreviewYear]=useState('2');
  const [bodyFont,setBodyFont]=useState(editC.bodyFont||'Assistant');
  const [headingFont,setHeadingFont]=useState(editC.headingFont||'Heebo');
  // fields: { fieldKey -> {text,color,fontSize,fontFamily} } — plain serializable only
  const fieldsRef=useRef(editC.veFields||{});
  const [fieldsTick,setFieldsTick]=useState(0); // triggers re-render when fieldsRef changes
  const [selKey,setSelKey]=useState(null);
  const [status,setStatus]=useState('מצב ניווט');
  const draggingEl=useRef(null);
  const dragOffset=useRef({});
  const keyCounter=useRef(0);

  // Sync fieldsRef if editC loads later from Firebase
  useEffect(()=>{
    if(editC.veFields&&Object.keys(editC.veFields).length){
      fieldsRef.current={...editC.veFields,...fieldsRef.current};
      setFieldsTick(t=>t+1);
    }
  },[editC.veFields]);

  const getFields=()=>fieldsRef.current;
  const setFields=updater=>{
    fieldsRef.current=typeof updater==='function'?updater(fieldsRef.current):updater;
    setFieldsTick(t=>t+1);
  };

  const selData=selKey?(fieldsRef.current[selKey]||{}):{};

  const mergedC=useMemo(()=>{
    const out={...editC,bodyFont,headingFont};
    Object.entries(fieldsRef.current).forEach(([k,v])=>{ if(v&&typeof v.text==='string') out[k]=v.text; });
    return out;
  // eslint-disable-next-line
  },[editC,fieldsTick,bodyFont,headingFont]);

  const previewUser={
    id:'preview',name:'תלמיד לדוגמה',year:previewYear,gender:previewGender,
    email:'preview@test.com',
    practical:[{id:'1',num:'1',date:'2025-01-10',open:'פגישה ראשונה',topics:'היכרות',position:'חיובי',focus:'קשר',insights:'תובנות',challenge:'אמון',lessons:'לקחים'}],
    supervision:[{id:'1',date:'2025-01-15',inst:'מנחה',topics:'ניהול מקרה',feedback:'טוב',contribution:'התפתחות',challenges:'אתגרים',selfLearn:'למידה',goals:'יעדים'}],
    cases:[],impact:[],proficiency:[],finalProject:null,yearHistory:[]
  };
  const req=gReq(previewUser.gender,previewUser.year,reqOv);

  useEffect(()=>{ document.body.className='theme-'+editTh; },[editTh]);
  useEffect(()=>{
    document.body.style.fontFamily=`'${bodyFont}',sans-serif`;
    document.querySelectorAll('h1,h2,h3,h4').forEach(el=>el.style.fontFamily=`'${headingFont}',sans-serif`);
  },[bodyFont,headingFont]);

  // Re-apply saved styles to DOM after every preview re-render
  const applyAll=useCallback(()=>{
    Object.entries(fieldsRef.current).forEach(([k,f])=>{
      document.querySelectorAll(`[data-ve-key="${k}"]`).forEach(el=>{
        if(el.contentEditable==='true') return; // don't fight active editor
        if(typeof f.text==='string') el.innerText=f.text;
        if(f.color) el.style.color=f.color;
        if(f.fontSize) el.style.fontSize=f.fontSize+'px';
        if(f.fontFamily) el.style.fontFamily=f.fontFamily;
      });
    });
  },[]);

  useEffect(()=>{
    const t1=setTimeout(applyAll,100);
    const t2=setTimeout(applyAll,600);
    return()=>{clearTimeout(t1);clearTimeout(t2);};
  },[previewView,previewGender,previewYear,fieldsTick,applyAll]);

  // Drag handlers
  const handleDragMouseDown=e=>{
    if(!dragMode) return;
    if(!e.target.innerText?.trim()) return;
    e.preventDefault(); e.stopPropagation();
    const cur=e.target.style.transform||'';
    const parts=cur.replace('translate(','').replace(')','').split(',');
    const tx=parts.length===2?parseFloat(parts[0]):0;
    const ty=parts.length===2?parseFloat(parts[1]):0;
    draggingEl.current=e.target;
    dragOffset.current={startX:e.clientX,startY:e.clientY,tx,ty};
    e.target.style.outline='2px dashed #f59e0b';
    e.target.style.cursor='grabbing'; e.target.style.zIndex='9999';
  };
  const handleDragMouseMove=useCallback(e=>{
    if(!dragMode||!draggingEl.current) return;
    const {startX,startY,tx,ty}=dragOffset.current;
    draggingEl.current.style.transform='translate('+(tx+e.clientX-startX)+'px,'+(ty+e.clientY-startY)+'px)';
  },[dragMode]);
  const handleDragMouseUp=useCallback(()=>{
    if(!draggingEl.current) return;
    draggingEl.current.style.cursor='grab';
    draggingEl.current.style.outline='2px solid #f59e0b';
    draggingEl.current=null;
  },[]);
  useEffect(()=>{
    if(dragMode){
      window.addEventListener('mousemove',handleDragMouseMove);
      window.addEventListener('mouseup',handleDragMouseUp);
      return()=>{window.removeEventListener('mousemove',handleDragMouseMove);window.removeEventListener('mouseup',handleDragMouseUp);};
    }
  },[dragMode,handleDragMouseMove,handleDragMouseUp]);

  const getKey=el=>{
    if(el.dataset.veKey) return el.dataset.veKey;
    keyCounter.current+=1;
    const k='vek'+keyCounter.current;
    el.dataset.veKey=k;
    return k;
  };

  // Commit active contentEditable and clean up — returns the CURRENT fields snapshot
  const commitAndDeselect=()=>{
    const prev=document.querySelector('[data-ve-sel]');
    if(prev&&prev.contentEditable==='true'){
      const txt=(prev.innerText||'').trim();
      const k=prev.dataset.veKey;
      if(k){
        // Write synchronously to ref so handleSave sees it immediately
        fieldsRef.current={...fieldsRef.current,[k]:{...(fieldsRef.current[k]||{}),text:txt}};
      }
      prev.contentEditable='false';
      prev.style.background=''; prev.style.cursor='';
    }
    if(prev){ prev.removeAttribute('data-ve-sel'); prev.style.outline=''; prev.style.outlineOffset=''; }
    setSelKey(null);
    setFieldsTick(t=>t+1);
    return fieldsRef.current; // return CURRENT snapshot
  };

  const handleClick=e=>{
    if(dragMode) return;
    if(browseMode){
      const btn=e.target.closest('button[data-view]');
      if(btn) setPreviewView(btn.dataset.view);
      return;
    }
    const el=e.target;
    if(el.contentEditable==='true') return;
    if(['BUTTON','A','INPUT','SELECT','IMG','SVG','PATH'].includes(el.tagName)) return;
    const txt=(el.innerText||'').trim();
    if(!txt||txt.length>300) return;
    e.stopPropagation();
    commitAndDeselect();
    const k=getKey(el);
    el.setAttribute('data-ve-sel','1');
    el.style.outline='2px solid #4a6fa5'; el.style.outlineOffset='2px';
    el.contentEditable='true'; el.style.background='rgba(74,111,165,0.05)'; el.style.cursor='text';
    el.focus();
    try{const r=document.createRange();r.selectNodeContents(el);r.collapse(false);window.getSelection().removeAllRanges();window.getSelection().addRange(r);}catch(_){}
    setSelKey(k);
    setStatus('עורך: "'+txt.substring(0,25)+'"');
  };

  // Live sync while typing
  useEffect(()=>{
    const onInput=e=>{
      const el=e.target;
      if(el.contentEditable!=='true') return;
      const k=el.dataset.veKey; if(!k) return;
      const txt=(el.innerText||'').trim();
      // Write to ref synchronously, then trigger render
      fieldsRef.current={...fieldsRef.current,[k]:{...(fieldsRef.current[k]||{}),text:txt}};
      setFieldsTick(t=>t+1);
    };
    document.addEventListener('input',onInput,true);
    return()=>document.removeEventListener('input',onInput,true);
  },[]);

  // Panel controls
  const applyText=v=>{
    if(!selKey) return;
    fieldsRef.current={...fieldsRef.current,[selKey]:{...(fieldsRef.current[selKey]||{}),text:v}};
    setFieldsTick(t=>t+1);
    document.querySelectorAll(`[data-ve-key="${selKey}"]`).forEach(el=>{ if(el.contentEditable!=='true') el.innerText=v; });
  };
  const applyColor=v=>{
    if(!selKey) return;
    fieldsRef.current={...fieldsRef.current,[selKey]:{...(fieldsRef.current[selKey]||{}),color:v}};
    setFieldsTick(t=>t+1);
    document.querySelectorAll(`[data-ve-key="${selKey}"]`).forEach(el=>el.style.color=v);
  };
  const applyFont=(f,el)=>{
    if(el) el.style.fontFamily=`'${f}',sans-serif`;
    if(selKey){
      fieldsRef.current={...fieldsRef.current,[selKey]:{...(fieldsRef.current[selKey]||{}),fontFamily:f}};
      setFieldsTick(t=>t+1);
    }
  };
  const applySize=delta=>{
    const el=document.querySelector('[data-ve-sel]');
    if(!el||!selKey) return;
    const s=parseFloat(window.getComputedStyle(el).fontSize)||16;
    const ns=Math.max(8,Math.round(s+delta));
    el.style.fontSize=ns+'px';
    fieldsRef.current={...fieldsRef.current,[selKey]:{...(fieldsRef.current[selKey]||{}),fontSize:ns}};
    setFieldsTick(t=>t+1);
  };

  const toggleMode=()=>{
    commitAndDeselect();
    setBrowseMode(b=>!b);
    setStatus(!browseMode?'מצב ניווט':'מצב עריכה — לחץ על טקסט לעריכה ישירה');
  };

  // SAVE — reads directly from ref (synchronous, always current)
  const handleSave=()=>{
    const currentFields=commitAndDeselect(); // flush any open editor first

    // Build clean plain object — only primitives allowed in Firestore
    const cleanFields={};
    Object.entries(currentFields).forEach(([k,v])=>{
      if(!v||typeof v!=='object') return;
      const c={};
      if(typeof v.text==='string'&&v.text) c.text=v.text;
      if(typeof v.color==='string'&&v.color) c.color=v.color;
      if(typeof v.fontSize==='number') c.fontSize=v.fontSize;
      if(typeof v.fontFamily==='string'&&v.fontFamily) c.fontFamily=v.fontFamily;
      if(Object.keys(c).length) cleanFields[k]=c;
    });

    // Promote named text fields to top-level content fields
    // Build toSave: start with existing editC named fields, then apply current changes
    const toSave={
      bodyFont:String(bodyFont||'Assistant'),
      headingFont:String(headingFont||'Heebo'),
      veFields:cleanFields,
    };
    // Carry over any existing named fields from editC
    ['title','subtitle','welcomeTitle','welcomeSub','footerTagline','footerContactTitle',
     'footerContactHours','footerLinksTitle','footerLink1','footerLink2','footerLink3','footerCopyright'
    ].forEach(k=>{if(editC[k]) toSave[k]=editC[k];});
    // Promote current veFields text to top-level (overrides editC values)
    Object.entries(cleanFields).forEach(([k,f])=>{
      if(typeof f.text==='string'&&f.text) toSave[k]=f.text;
    });

    // onSave = saveAll in AdminPanel → calls saveSite → writes Firebase + updates siteC
    onSave(toSave);
  };

  const selFontSize=selKey?(fieldsRef.current[selKey]?.fontSize||16):16;
  const selText=selKey?(fieldsRef.current[selKey]?.text||''):'';
  const selColor=selKey?(fieldsRef.current[selKey]?.color||'#333333'):'#333333';

  const navItems=[
    {id:'dashboard',l:'סקירה'},{id:'practical',l:'שעות התנסות'},
    {id:'supervision',l:'הדרכות אישיות'},{id:'case',l:'הצגת מקרה'},
    {id:'impact',l:'שעות משפיעות'},{id:'contacts',l:'אנשי קשר'},
  ];

  return(
    <div style={{position:'fixed',inset:0,zIndex:9999,display:'flex',flexDirection:'column'}}
      onKeyDown={e=>{ if(e.key==='Escape'){e.preventDefault();commitAndDeselect();} }}>

      {/* TOP BAR */}
      <div style={{background:'#1e1b4b',color:'white',padding:'8px 14px',display:'flex',alignItems:'center',gap:'8px',flexShrink:0,zIndex:10001,borderBottom:'1px solid rgba(255,255,255,.1)',flexWrap:'wrap'}}>
        <span style={{fontWeight:800,fontSize:'.88rem',whiteSpace:'nowrap'}}>עורך ויזואלי</span>
        <button onClick={toggleMode} style={{padding:'5px 12px',borderRadius:'20px',fontWeight:700,fontSize:'.82rem',cursor:'pointer',border:'2px solid',whiteSpace:'nowrap',background:browseMode?'rgba(255,255,255,.15)':'#4a6fa5',borderColor:browseMode?'rgba(255,255,255,.3)':'#4a6fa5',color:'white'}}>
          {browseMode?'🔍 ניווט':'✏️ עריכה'}
        </button>
        <button onClick={()=>{setDragMode(d=>!d);if(!dragMode)setBrowseMode(false);}}
          style={{padding:'5px 11px',borderRadius:'20px',fontWeight:700,fontSize:'.82rem',cursor:'pointer',border:'2px solid',whiteSpace:'nowrap',background:dragMode?'#f59e0b':'rgba(255,255,255,.12)',borderColor:dragMode?'#f59e0b':'rgba(255,255,255,.25)',color:dragMode?'#1e1b4b':'white'}}>
          ✥ הזזה
        </button>
        <div style={{display:'flex',borderRadius:'20px',overflow:'hidden',border:'1px solid rgba(255,255,255,.25)'}}>
          {[['female','נקבה'],['male','זכר']].map(([g,l])=>(
            <button key={g} onClick={()=>{setPreviewGender(g);if(g==='male'&&previewYear==='4')setPreviewYear('3');}} style={{padding:'4px 9px',border:'none',cursor:'pointer',fontSize:'.73rem',fontWeight:700,background:previewGender===g?'white':'transparent',color:previewGender===g?'#3d5a8a':'rgba(255,255,255,.75)'}}>{l}</button>
          ))}
        </div>
        <div style={{display:'flex',borderRadius:'20px',overflow:'hidden',border:'1px solid rgba(255,255,255,.25)'}}>
          {(previewGender==='male'?[['2',"ב'"],['3',"ג'"]]:[ ['2',"ב'"],['3',"ג'"],['4',"ד'"]]).map(([y,l])=>(
            <button key={y} onClick={()=>setPreviewYear(y)} style={{padding:'4px 8px',border:'none',cursor:'pointer',fontSize:'.71rem',fontWeight:700,background:previewYear===y?'white':'transparent',color:previewYear===y?'#3d5a8a':'rgba(255,255,255,.75)'}}>{l}</button>
          ))}
        </div>
        <div style={{display:'flex',gap:'3px'}}>
          {Object.entries(THEMES).map(([k,t])=>(
            <button key={k} onClick={()=>setEditTh(k)} style={{padding:'3px 7px',borderRadius:'6px',fontSize:'.69rem',fontWeight:700,border:'none',cursor:'pointer',background:editTh===k?'white':'rgba(255,255,255,.12)',color:editTh===k?'#3d5a8a':'rgba(255,255,255,.7)'}}>{t.label.split(' ')[0]}</button>
          ))}
        </div>
        <span style={{flex:1,fontSize:'.71rem',color:'rgba(255,255,255,.4)',overflow:'hidden',whiteSpace:'nowrap',textOverflow:'ellipsis'}}>{status}</span>
        <button onClick={handleSave} disabled={saving}
          style={{padding:'5px 13px',borderRadius:'7px',background:saved?'#10b981':'#4a6fa5',color:'white',fontWeight:700,border:'none',cursor:'pointer',fontSize:'.81rem'}}>
          {saving?'שומר...':saved?'נשמר ✓':'שמור'}
        </button>
        <button onClick={()=>{commitAndDeselect();onClose();}} style={{padding:'5px 10px',borderRadius:'7px',background:'rgba(239,68,68,.75)',color:'white',fontWeight:700,border:'none',cursor:'pointer'}}>סגור</button>
      </div>

      {/* PREVIEW */}
      <div style={{flex:1,overflow:'auto',background:'var(--bg)',cursor:dragMode?'grab':browseMode?'default':'text'}}
        onClick={handleClick}
        onMouseDown={dragMode?handleDragMouseDown:undefined}>

        {!browseMode&&!dragMode&&(
          <div style={{position:'sticky',top:0,zIndex:50,background:'rgba(74,111,165,.1)',borderBottom:'2px dashed rgba(74,111,165,.3)',padding:'4px 16px',fontSize:'.75rem',color:'var(--a1)',fontWeight:600,textAlign:'center'}}>
            לחץ על טקסט לעריכה ישירה — ESC לסיום
          </div>
        )}

        <div className="app-hdr" style={{position:'sticky',top:!browseMode&&!dragMode?'26px':0,zIndex:40}}>
          <div style={{maxWidth:'1400px',width:'100%',margin:'0 auto',padding:'10px 40px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div style={{display:'flex',alignItems:'center',gap:'18px'}}>
              <img src={`data:image/png;base64,${LOGO}`} className="logo-img" style={{height:'90px',width:'auto'}}/>
              <div style={{borderRight:'2px solid var(--brd)',paddingRight:'16px'}}>
                <div data-ve-key="title" style={{fontWeight:800,fontSize:'1rem',color:'var(--txt)'}}>{mergedC.title||'מכללת תורת הנפש'}</div>
                <div data-ve-key="subtitle" style={{fontSize:'.72rem',color:'var(--sub)'}}>{mergedC.subtitle||'יומן תלמיד-ה | מעקב הכשרה'}</div>
              </div>
            </div>
          </div>
        </div>

        <div style={{background:'var(--bg)',borderBottom:'1px solid var(--brd)',padding:'8px 40px',position:'sticky',top:'110px',zIndex:39}}>
          <div style={{maxWidth:'1400px',margin:'0 auto',display:'flex',gap:'6px',flexWrap:'nowrap',overflowX:'auto'}}>
            {navItems.map(n=>(
              <button key={n.id} data-view={n.id}
                onClick={e=>{if(browseMode){e.stopPropagation();setPreviewView(n.id);}}}
                className="nav-tab"
                style={{background:previewView===n.id?`linear-gradient(135deg,var(--nf),var(--nt))`:'var(--card)',color:previewView===n.id?'white':'var(--txt)',border:previewView===n.id?'none':'1px solid var(--brd)',cursor:browseMode?'pointer':'default',pointerEvents:browseMode?'auto':'none'}}>
                {n.l}
              </button>
            ))}
          </div>
        </div>

        <div style={{maxWidth:'1400px',width:'100%',margin:'0 auto',padding:'20px 40px',boxSizing:'border-box'}}>
          {previewView==='dashboard'&&<Dashboard user={previewUser} setView={setPreviewView} req={req} siteC={mergedC}/>}
          {previewView==='practical'&&<PracticalHours user={previewUser} updateUser={()=>{}} req={req}/>}
          {previewView==='supervision'&&<SupervisionHours user={previewUser} updateUser={()=>{}} req={req}/>}
          {previewView==='case'&&<CasePresentation user={previewUser} updateUser={()=>{}} req={req}/>}
          {previewView==='impact'&&<ImpactHours user={previewUser} updateUser={()=>{}} req={req}/>}
          {previewView==='contacts'&&<Contacts user={previewUser}/>}
        </div>
        <Footer siteC={mergedC}/>

        {/* FLOATING EDIT PANEL */}
        {selKey&&!browseMode&&(
          <div style={{position:'fixed',bottom:'20px',left:'20px',zIndex:10000,background:'white',borderRadius:'14px',padding:'14px',boxShadow:'0 8px 32px rgba(0,0,0,.2)',border:'1px solid #e5e7eb',minWidth:'220px',maxWidth:'270px'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'10px'}}>
              <span style={{fontSize:'.76rem',fontWeight:700,color:'#374151'}}>עריכת אלמנט</span>
              <button onClick={commitAndDeselect} style={{background:'none',border:'none',cursor:'pointer',color:'#9ca3af',fontSize:'1.1rem',lineHeight:1}}>×</button>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:'8px'}}>
              <div>
                <label style={{display:'block',fontSize:'.72rem',fontWeight:700,color:'#6b7280',marginBottom:'3px'}}>טקסט</label>
                <input value={selText} onChange={e=>applyText(e.target.value)}
                  style={{width:'100%',padding:'6px 9px',border:'1.5px solid #e5e7eb',borderRadius:'7px',fontFamily:'Assistant,sans-serif',fontSize:'.85rem',boxSizing:'border-box'}}/>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'7px'}}>
                <div>
                  <label style={{display:'block',fontSize:'.72rem',fontWeight:700,color:'#6b7280',marginBottom:'3px'}}>צבע</label>
                  <input type="color" value={selColor.startsWith('#')?selColor:'#333333'} onChange={e=>applyColor(e.target.value)}
                    style={{width:'100%',height:'30px',borderRadius:'6px',border:'1.5px solid #e5e7eb',cursor:'pointer',padding:'2px'}}/>
                </div>
                <div>
                  <label style={{display:'block',fontSize:'.72rem',fontWeight:700,color:'#6b7280',marginBottom:'3px'}}>גודל</label>
                  <div style={{display:'flex',alignItems:'center',gap:'3px'}}>
                    <button onClick={()=>applySize(-1)} style={{flex:1,padding:'4px',borderRadius:'5px',background:'#f3f4f6',border:'1px solid #e5e7eb',cursor:'pointer',fontWeight:700}}>−</button>
                    <span style={{fontSize:'.77rem',fontWeight:700,color:'#374151',minWidth:'26px',textAlign:'center'}}>{selFontSize}</span>
                    <button onClick={()=>applySize(1)} style={{flex:1,padding:'4px',borderRadius:'5px',background:'#f3f4f6',border:'1px solid #e5e7eb',cursor:'pointer',fontWeight:700}}>+</button>
                  </div>
                </div>
              </div>
              <div>
                <label style={{display:'block',fontSize:'.72rem',fontWeight:700,color:'#6b7280',marginBottom:'3px'}}>פונט</label>
                <FontHoverPicker selEl={document.querySelector('[data-ve-sel]')} dark={false} onApply={applyFont}/>
              </div>
            </div>
            <div style={{marginTop:'10px',paddingTop:'10px',borderTop:'1px solid #f3f4f6'}}>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'6px'}}>
                <div>
                  <label style={{display:'block',fontSize:'.7rem',fontWeight:700,color:'#6b7280',marginBottom:'2px'}}>גוף</label>
                  <select value={bodyFont} onChange={e=>{setBodyFont(e.target.value);document.body.style.fontFamily=`'${e.target.value}',sans-serif`;}}
                    style={{width:'100%',padding:'4px 6px',border:'1px solid #e5e7eb',borderRadius:'6px',fontSize:'.78rem'}}>
                    {FONTS_LIST.map(f=><option key={f} value={f}>{f}</option>)}
                  </select>
                </div>
                <div>
                  <label style={{display:'block',fontSize:'.7rem',fontWeight:700,color:'#6b7280',marginBottom:'2px'}}>כותרות</label>
                  <select value={headingFont} onChange={e=>{setHeadingFont(e.target.value);document.querySelectorAll('h1,h2,h3').forEach(el=>el.style.fontFamily=`'${e.target.value}',sans-serif`);}}
                    style={{width:'100%',padding:'4px 6px',border:'1px solid #e5e7eb',borderRadius:'6px',fontSize:'.78rem'}}>
                    {FONTS_LIST.map(f=><option key={f} value={f}>{f}</option>)}
                  </select>
                </div>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}



ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
